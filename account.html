<script>
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");
  if(el){
    el.innerText = cart.length;
  }
}
const API = "https://fark618-backend.onrender.com";
let user = localStorage.getItem("user");


// 🔐 LOGIN UI
function loadLogin(){

  let user =
  localStorage.getItem("user");

  if(user){

    document.getElementById(
      "loginBox"
    ).innerHTML = `
      <button onclick="logout()">
        Logout
      </button>
    `;

    return;
  }

  document.getElementById(
    "loginBox"
  ).innerHTML = `

  <input
    id="phone"
    placeholder="Mobile Number">

  <button
    onclick="checkUser()">
    Continue
  </button>

  <div id="extraBox"></div>

  `;
}
async function checkUser(){

 const phone =
 document.getElementById("phone").value;

 if(phone.length !== 10){

   alert("Enter valid mobile");

   return;
 }

 const res = await fetch(
   API + "/check-user",
   {
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify({
       phone
     })
   }
 );

 const data =
 await res.json();

if(data.exists){

   if(data.user.status === "Deleted"){
      alert("Account Deleted");
      return;
   }

   if(data.user.status === "Deactivated"){
      alert("Account Deactivated");
      return;
   }

   showOtpBox(phone);

}else{
  
 document.getElementById(
 "extraBox"
).innerHTML = `
<input
 id="regName"
 placeholder="Name"
 autocomplete="off">

<input
 id="regEmail"
 placeholder="Email"
 autocomplete="off">
 
<button
 onclick="registerUser()">
 Create Account
</button>
`;
 }

}
  async function registerUser(){

 const phone =
 document.getElementById("phone").value;

 const name =
 document.getElementById("regName").value;

 const email =
 document.getElementById("regEmail").value;


 const res = await fetch(
   API + "/register",
   {
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify({
       name,
       email,
       phone,
     })
   }
 );

 const data =
 await res.json();

 if(data.success){

 showOtpBox(phone);
 }

}
  function showOtpBox(phone){

  alert("OTP : 123456");

  document.getElementById("loginBox").innerHTML = `

    <input
      id="otp"
      placeholder="Enter OTP">

    <button
      onclick="verifyOtp('${phone}')">
      Verify OTP
    </button>

  `;

}
  function verifyOtp(phone){

  const otp =
  document.getElementById("otp").value;

  if(otp === "123456"){

    localStorage.setItem(
      "user",
      phone
    );

    location.reload();

  }else{

    alert("Invalid OTP");

  }

}
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function goWishlist(){
  location.href = "wishlist.html";
}
// 📦 LOAD ORDERS
function loadOrders(){

  let user = localStorage.getItem("user");

  fetch(API + "/orders")
    .then(res => res.json())
    .then(data => {

    let myOrders = data.filter(o =>
  String(o.user || o.phone) === String(user)
);
      let html = "";

      if(myOrders.length === 0){

        html = `
          <p class='empty'>
            No orders found
          </p>
        `;

      }else{

        myOrders.reverse().forEach(order => {

      const items =
order.products ||
order.items ||
[order.product];
 const item = items[0]; 
 let productsHTML = "";

items.forEach(item => {

productsHTML += `

<div style="
display:flex;
gap:12px;
margin-bottom:12px;
">

<img
src="${
item.primaryImage ||
item.image ||
item.images?.[0]
}"
style="
width:70px;
height:85px;
object-fit:cover;
border-radius:8px;
">

<div>

<div style="
font-size:18px;
font-weight:600;
">
${item.styleNo || item.name}
</div>

<div>
₹${item.price}
</div>

<div>
Size: ${item.size || "-"}
</div>

<div>
Qty: ${item.qty || 1}
</div>

</div>

</div>

`;

});
          
html += `

<div
onclick="openOrder('${order._id}')"
style="
background:#fff;
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-bottom:15px;
cursor:pointer;
display:flex;
gap:20px;
align-items:center;
">

<div style="flex:1;">

${productsHTML}

<div style="
color:#555;
margin-top:6px;
">
Order Confirmed:
${new Date(
  order.orderDate || order.createdAt
).toLocaleDateString("en-IN")}

<br>

${order.status === "Delivered"
? "Delivered On:"
: "Expected Delivery:"}

${order.status === "Delivered"
? new Date(
    order.deliveryDate
  ).toLocaleDateString("en-IN")
:(() => {
  const d = new Date(
    order.orderDate || order.createdAt
  );
  d.setDate(d.getDate() + 4);
  return d.toLocaleDateString("en-IN");
})()
}
</div>

</div>

  <div style="
  font-size:24px;
  color:#888;
  ">
    ›
  </div>

</div>

`;
        });

      }

      document.getElementById("orders").innerHTML = html;

    });

}
  function loadWishlist(){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];
  let html = "";

  if(fav.length === 0){
    html = "<p>No items in wishlist</p>";
  } else {

    fav.forEach(p => {
      html += `
        <div class="card" onclick="openProduct('${p._id || p.id}')">
          <img src="${p.images?.[0] || p.image}" width="80">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>

          <button onclick="event.stopPropagation(); removeItem('${p._id || p.id}')">
            Remove
          </button>
        </div>
      `;
    });

  }

  document.getElementById("wishlistItems").innerHTML = html;
}
function removeItem(id){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav = fav.filter(p => (p._id || p.id) != id);

  localStorage.setItem("fav", JSON.stringify(fav));

  loadWishlist();
}
function openProduct(id){

  fetch(API + "/products")
    .then(res => res.json())
    .then(data => {

      const product = data.find(p => p._id == id);

      localStorage.setItem("selectedProduct", JSON.stringify(product));

      window.location.href = "product.html";
    });

}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
 function showSection(section, event){

  // 🔥 ACTIVE MENU ADD
  document.querySelectorAll(".menu p")
    .forEach(x => x.classList.remove("active"));

  event.currentTarget.classList.add("active");

  // 🔽 existing code
  document.getElementById("ordersSection").style.display = "none";
  document.getElementById("wishlistSection").style.display = "none";
  document.getElementById("profileSection").style.display = "none";
  document.getElementById("addressSection").style.display = "none";

  if(section === "orders"){
    document.getElementById("ordersSection").style.display = "block";
  }

  if(section === "wishlist"){
    document.getElementById("wishlistSection").style.display = "block";
  }

  if(section === "profile"){
    document.getElementById("profileSection").style.display = "block";
    loadProfile();
  }

  if(section === "address"){
    document.getElementById("addressSection").style.display = "block";
    loadAddress();
  }
}
// 🔥 TOGGLE ORDERS
let ordersLoaded = false;

function toggleOrders(){

  let box = document.getElementById("orders");

  if(box.style.display === "none"){
    box.style.display = "block";

    if(!ordersLoaded){
      loadOrders();
      ordersLoaded = true;
    }

  } else {
    box.style.display = "none";
  }

}

let editIndex = -1;

function saveAddress(){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  const data = {
    name: document.getElementById("a_name").value,
    phone: document.getElementById("a_phone").value,
    pincode: document.getElementById("a_pincode").value,
    city: document.getElementById("a_city").value,
    state: document.getElementById("a_state").value,
    address: document.getElementById("a_address").value
  };

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  if(editIndex >= 0){
    addresses[editIndex] = data;
    editIndex = -1;
  } else {
    addresses.push(data);
  }

  localStorage.setItem(key, JSON.stringify(addresses));

  clearAddressForm();
  loadAddress();
  alert("Saved ✅");
}

function loadAddress(){

  let user = localStorage.getItem("user");

  // ❌ login இல்லனா block
  if(!user){
    document.getElementById("addressList").innerHTML = "<p class='empty'>Please login</p>";
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  let html = "";

  if(addresses.length === 0){
    html = "<p class='empty'>No address added</p>";
  } else {

    addresses.forEach((a, i) => {
      html += `
       <div class="card"
onclick="selectAddress(${i})"
style="
position:relative;
cursor:pointer;
border:
${localStorage.getItem('selectedAddressIndex') == i
? '2px solid #2874f0'
: '1px solid #ddd'}
;">

          <b>${a.name}</b> (${a.phone})<br>
          ${a.address}, ${a.city}, ${a.state} - ${a.pincode}

          <!-- 🔥 3 DOTS -->
          <div style="position:absolute; top:10px; right:10px;">
           <i class="fa-solid fa-ellipsis-vertical"
onclick="event.stopPropagation(); toggleMenu(${i})"
style="cursor:pointer;"></i>

            <div id="menu${i}" style="display:none; background:#fff; border:1px solid #ddd; padding:5px; position:absolute; right:0;">
              <div onclick="event.stopPropagation(); editAddress(${i})">Edit</div>
              <div onclick="event.stopPropagation(); deleteAddress(${i})"style="color:red;">Delete</div>
            </div>
          </div>

        </div>
      `;
    });

  }

  document.getElementById("addressList").innerHTML = html;
}
function editAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];
  let a = addresses[i];

  document.getElementById("a_name").value = a.name;
  document.getElementById("a_phone").value = a.phone;
  document.getElementById("a_pincode").value = a.pincode;
  document.getElementById("a_city").value = a.city;
  document.getElementById("a_state").value = a.state;
  document.getElementById("a_address").value = a.address;

  document.getElementById("addressForm").style.display = "block";

  editIndex = i;
}

function deleteAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  if(confirm("Delete this address?")){
    addresses.splice(i,1);
    localStorage.setItem(key, JSON.stringify(addresses));
    loadAddress();
  }
}
function clearAddressForm(){
  document.getElementById("a_name").value = "";
  document.getElementById("a_phone").value = "";
  document.getElementById("a_pincode").value = "";
  document.getElementById("a_city").value = "";
  document.getElementById("a_state").value = "";
  document.getElementById("a_address").value = "";
}
function saveProfile(){

  let user = localStorage.getItem("user");

  const data = {
    name: document.getElementById("p_name").value,
    email: document.getElementById("p_email").value,
    gender: document.querySelector('input[name="gender"]:checked')?.value
  };

  localStorage.setItem("profile_" + user, JSON.stringify(data));

  alert("Saved ✅");

  // 🔥 disable again
  document.getElementById("p_name").disabled = true;
  document.getElementById("p_email").disabled = true;
  document.getElementById("p_mobile").disabled = true;

  document.querySelectorAll('input[name="gender"]').forEach(x => x.disabled = true);

  document.getElementById("saveBtn").style.display = "none";
  document.getElementById("editBtn").style.display = "inline";

  updateUserNameUI();
}
async function loadProfile(){

 const phone =
 localStorage.getItem("user");

 if(!phone) return;

 const res = await fetch(
   API + "/user/" + phone
 );

 const data = await res.json();

 document.getElementById("p_name").value =
 data?.name || "";

 document.getElementById("p_email").value =
 data?.email || "";

 document.getElementById("p_mobile").value =
 data?.phone || "";

 if(data?.gender){
   document.querySelector(
     `input[value="${data.gender}"]`
   ).checked = true;
 }

 document.getElementById("p_name").disabled = true;
 document.getElementById("p_email").disabled = true;
 document.getElementById("p_mobile").disabled = true;

 document.querySelectorAll(
   'input[name="gender"]'
 ).forEach(x => x.disabled = true);

}

"Deactivate account?"
)) return;

API + "/deactivate-user/" + phone,
{
method:"PUT"
});

  async function deleteAccount(){

if(
!confirm(
"Account will be permanently deleted. Continue?"
)
) return;

const phone =
localStorage.getItem("user");

API + "/delete-user/" + phone,

});

);

 function openOrder(id){

  fetch(API + "/orders")

  .then(res => res.json())

  .then(data => {

    const order =
      data.find(o => o._id === id);

    if(!order) return;

    localStorage.setItem(
      "selectedOrder",
      JSON.stringify(order)
    );

    window.location.href =
      "order-details.html";

  });

}
  
function closeOrder(){
