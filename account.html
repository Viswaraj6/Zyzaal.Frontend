    .address-grid{

.address-grid textarea{

.footer-col h4 {

.footer-col a {

</head>

<body>

 <div id="orderPopup" style="

    <span onclick="closeOrder()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:20px;">✖</span>

<script>
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");
  if(el){
    el.innerText = cart.length;
  }
}
const API = "https://fark618-backend.onrender.com";
let user = localStorage.getItem("user");


// 🔐 LOGIN UI
function loadLogin(){

  let user = localStorage.getItem("user");

  if(user){

    let profile = JSON.parse(localStorage.getItem("profile_" + user)) || {};

    document.getElementById("loginBox").innerHTML = `
      <button onclick="logout()">Logout</button>
    `;

  } else {

    document.getElementById("loginBox").innerHTML = `
      <input id="phone" placeholder="Enter Mobile Number">
      <button onclick="login()">Login</button>
    `;

  }
}
function login(){

  let phone = document.getElementById("phone").value;

  if(!phone || phone.length < 10){
    alert("Enter valid mobile number ❗");
    return;
  }

  localStorage.setItem("user", phone);
  location.reload();
}
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function goWishlist(){
  location.href = "wishlist.html";
}
// 📦 LOAD ORDERS
function loadOrders(){

  let user = localStorage.getItem("user");

  fetch(API + "/orders")
    .then(res => res.json())
    .then(data => {

      let myOrders = data.filter(o =>
        String(o.user) === String(user) ||
        String(o.phone) === String(user)
      );

      let html = "";

      if(myOrders.length === 0){
        html = "<p class='empty'>No orders</p>";
      } else {

        myOrders.forEach(order => {
          html += `
            <div class="card">

              <b>Total:</b> ₹${order.total}<br>
              <b>Status:</b> ${order.status}<br>
              <b>Date:</b> ${new Date(order.orderDate).toLocaleDateString("en-IN")}

              <p class="view-order" data-id="${order._id}">
                See all updates >
              </p>

            </div>
          `;
        });

      }

      document.getElementById("orders").innerHTML = html;

      setTimeout(() => {
        document.querySelectorAll(".view-order").forEach(btn => {
          btn.onclick = function(){
            openOrder(this.dataset.id);
          }
        });
      }, 0);

    });

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  let html = "";

  if(fav.length === 0){
    html = "<p class='empty'>No wishlist items</p>";
  } else {

    fav.forEach(p => {

      html += `
        <div class="card" style="display:flex; gap:15px; align-items:center;">

          <img src="${p.image || 'https://via.placeholder.com/80'}"
               width="110" height="140"
               style="border-radius:8px; cursor:pointer;"
              onclick="openProduct('${p.id}')">

          <div style="flex:1; cursor:pointer;" onclick="openProduct('${p.id}')">
            <h3 style="margin:0;">${p.name}</h3>
            <p style="margin:5px 0;">₹${p.price}</p>
          </div>

          <button onclick="removeWishlist('${p.id}')"
                  style="width:auto; padding:6px 10px; background:red;">
            Remove
          </button>

        </div>
      `;

    });

  }

  document.getElementById("wishlistItems").innerHTML = html;
}
  function removeWishlist(id){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav = fav.filter(p => p.id !== id);

  localStorage.setItem("fav", JSON.stringify(fav));

  loadWishlist();
}
  function openProduct(id){
  window.location.href = "product.html?id=" + id;
}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
 function showSection(section, event){

  // 🔥 ACTIVE MENU ADD
  document.querySelectorAll(".menu p")
    .forEach(x => x.classList.remove("active"));

  event.currentTarget.classList.add("active");

  // 🔽 existing code
  document.getElementById("ordersSection").style.display = "none";
  document.getElementById("wishlistSection").style.display = "none";
  document.getElementById("profileSection").style.display = "none";
  document.getElementById("addressSection").style.display = "none";

  if(section === "orders"){
    document.getElementById("ordersSection").style.display = "block";
  }

  if(section === "wishlist"){
    document.getElementById("wishlistSection").style.display = "block";
  }

  if(section === "profile"){
    document.getElementById("profileSection").style.display = "block";
    loadProfile();
  }

  if(section === "address"){
    document.getElementById("addressSection").style.display = "block";
    loadAddress();
  }
}
// 🔥 TOGGLE ORDERS
let ordersLoaded = false;

function toggleOrders(){

  let box = document.getElementById("orders");

  if(box.style.display === "none"){
    box.style.display = "block";

    if(!ordersLoaded){
      loadOrders();
      ordersLoaded = true;
    }

  } else {
    box.style.display = "none";
  }

}

let editIndex = -1;

function saveAddress(){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  const data = {
    name: document.getElementById("a_name").value,
    phone: document.getElementById("a_phone").value,
    pincode: document.getElementById("a_pincode").value,
    city: document.getElementById("a_city").value,
    state: document.getElementById("a_state").value,
    address: document.getElementById("a_address").value
  };

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  if(editIndex >= 0){
    addresses[editIndex] = data;
    editIndex = -1;
  } else {
    addresses.push(data);
  }

  localStorage.setItem(key, JSON.stringify(addresses));

  clearAddressForm();
  loadAddress();
  alert("Saved ✅");
}

function loadAddress(){

  let user = localStorage.getItem("user");

  // ❌ login இல்லனா block
  if(!user){
    document.getElementById("addressList").innerHTML = "<p class='empty'>Please login</p>";
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  let html = "";

  if(addresses.length === 0){
    html = "<p class='empty'>No address added</p>";
  } else {

    addresses.forEach((a, i) => {
      html += `
        <div class="card" style="position:relative;">

          <b>${a.name}</b> (${a.phone})<br>
          ${a.address}, ${a.city}, ${a.state} - ${a.pincode}

          <!-- 🔥 3 DOTS -->
          <div style="position:absolute; top:10px; right:10px;">
            <i class="fa-solid fa-ellipsis-vertical" onclick="toggleMenu(${i})" style="cursor:pointer;"></i>

            <div id="menu${i}" style="display:none; background:#fff; border:1px solid #ddd; padding:5px; position:absolute; right:0;">
              <div onclick="editAddress(${i})">Edit</div>
              <div onclick="deleteAddress(${i})" style="color:red;">Delete</div>
            </div>
          </div>

        </div>
      `;
    });

  }

  document.getElementById("addressList").innerHTML = html;
}
function editAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];
  let a = addresses[i];

  document.getElementById("a_name").value = a.name;
  document.getElementById("a_phone").value = a.phone;
  document.getElementById("a_pincode").value = a.pincode;
  document.getElementById("a_city").value = a.city;
  document.getElementById("a_state").value = a.state;
  document.getElementById("a_address").value = a.address;

  document.getElementById("addressForm").style.display = "block";

  editIndex = i;
}

function deleteAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  if(confirm("Delete this address?")){
    addresses.splice(i,1);
    localStorage.setItem(key, JSON.stringify(addresses));
    loadAddress();
  }
}
function clearAddressForm(){
  document.getElementById("a_name").value = "";
  document.getElementById("a_phone").value = "";
  document.getElementById("a_pincode").value = "";
  document.getElementById("a_city").value = "";
  document.getElementById("a_state").value = "";
  document.getElementById("a_address").value = "";
}
function saveProfile(){

  let user = localStorage.getItem("user");

  const data = {
    name: document.getElementById("p_name").value,
    email: document.getElementById("p_email").value,
    gender: document.querySelector('input[name="gender"]:checked')?.value
  };

  localStorage.setItem("profile_" + user, JSON.stringify(data));

  alert("Saved ✅");

  // 🔥 disable again
  document.getElementById("p_name").disabled = true;
  document.getElementById("p_email").disabled = true;
  document.getElementById("p_mobile").disabled = true;

  document.querySelectorAll('input[name="gender"]').forEach(x => x.disabled = true);

  document.getElementById("saveBtn").style.display = "none";
  document.getElementById("editBtn").style.display = "inline";

  updateUserNameUI();
}
 function loadProfile(){

  let user = localStorage.getItem("user");

  const data = JSON.parse(localStorage.getItem("profile_" + user)) || {};

  document.getElementById("p_name").value = data.name || "";
  document.getElementById("p_email").value = data.email || "";
  document.getElementById("p_mobile").value = user || "";

  if(data.gender){
    document.querySelector(`input[value="${data.gender}"]`).checked = true;
  }

  // 🔥 ADD THIS HERE
  document.getElementById("p_name").disabled = true;
  document.getElementById("p_email").disabled = true;
  document.getElementById("p_mobile").disabled = true;

  document.querySelectorAll('input[name="gender"]')
    .forEach(x => x.disabled = true);
}
// 🔻 NAV
function goHome(){ location.href = "index.html"; }
function goAccount(){ location.href = "account.html"; }
function goCart(){ location.href = "cart.html"; }
function goPage(page){
  window.location.href = page;
}
function toggleAddressForm(){
  const form = document.getElementById("addressForm");

  if(form.style.display === "none"){
    form.style.display = "block";
  } else {
    form.style.display = "none";
  }
}
  function toggleMenu(i){
  const menu = document.getElementById("menu"+i);

  if(menu.style.display === "none"){
    menu.style.display = "block";
  } else {
    menu.style.display = "none";
  }
}
 function updateUserNameUI(){

  let user = localStorage.getItem("user");
  const el = document.getElementById("userName");

  if(!user){
    el.innerText = "Hello, Guest";
    return;
  }

  const profile = JSON.parse(localStorage.getItem("profile_" + user)) || {};

  el.innerText = "Hello, " + (profile.name || user);
}
  function enableEdit(){

  document.getElementById("p_name").disabled = false;
  document.getElementById("p_email").disabled = false;
  document.getElementById("p_mobile").disabled = false;

  // gender enable
  document.querySelectorAll('input[name="gender"]').forEach(x => x.disabled = false);

  document.getElementById("saveBtn").style.display = "block";
  document.getElementById("editBtn").style.display = "none";
}
  function openOrder(id){

  fetch(API + "/orders")
    .then(res => res.json())
    .then(data => {

      let order = data.find(o => o._id === id);

      if(!order) return;

      let html = `
        <div class="timeline">

          <div class="step done">Order Confirmed</div>
