  <style>
  body{

.address-grid textarea{

}

.step::before{
  content:"";

  left:-10px;

  height:12px;
  background:#ccc;
  border-radius:50%;
}

.step.done::before{

}

.footer-container {

.footer-col h4 {

.footer-col p {

<script>
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");
  if(el){
    el.innerText = cart.length;
  }
}
const API = "https://fark618-backend.onrender.com";
let user = localStorage.getItem("user");


// 🔐 LOGIN UI
function loadLogin(){

    let user = localStorage.getItem("user");

    if(user){

        document.getElementById("loginBox").innerHTML = `
            <button onclick="logout()">
                Logout
            </button>
        `;

        document.getElementById("loginModal").style.display = "none";

        return;
    }

    document.getElementById("loginBox").innerHTML = "";

    document.getElementById("loginModal").style.display = "flex";

    document.getElementById("loginModalContent").innerHTML = `

        <input
        id="phone"
        placeholder="Mobile Number"
        style="width:100%;box-sizing:border-box;">

        <br>

        <button onclick="checkUser()">
            Continue
        </button>

        <div id="extraBox"></div>

    `;
}
  async function checkUser(){

 const phone =
 document.getElementById("phone").value;

 if(phone.length !== 10){

   alert("Enter valid mobile");

   return;
 }

 const res = await fetch(
   API + "/check-user",
   {
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify({
       phone
     })
   }
 );

 const data =
 await res.json();
const req = await fetch(
API +
"/latest-request/" +
phone
);

const reqData =
await req.json();
if(
reqData &&
reqData.status === "Pending"
){

document.body.innerHTML = `

<div style="
max-width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
text-align:center;
">

<h2 style="color:#2563eb">
Request Submitted
</h2>

<p>
Your reactivation request is being processed.
</p>

<p>
Our support team will review and approve your request shortly.
</p>

</div>

`;

return;

}
if(
reqData &&
reqData.status === "Approved" &&
!localStorage.getItem(
"approvedShown_" + phone
)
){

alert(
"Your account has been reactivated. Please login."
);

localStorage.setItem(
"approvedShown_" + phone,
"yes"
);
showOtpBox(phone);
return;
}
  if(data.exists){

  if(data.user.status === "Deleted"){

localStorage.setItem(
"reactivationPhone",
phone
);

document.body.innerHTML = `

<div style="
max-width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
text-align:center;
">

<h2>
Account Deleted
</h2>

<p>
Your account has been deleted.
</p>

<p>
You can submit an account recovery request.
</p>

<textarea
id="reason"
placeholder="Reason"
style="
width:100%;
height:120px;
">
</textarea>

<br><br>

<button
onclick="submitRequest()">
Request Recovery
</button>

</div>

`;

return;
}

   if(data.user.status === "Deactivated"){
     localStorage.setItem(
"reactivationPhone",
phone
);
    document.body.innerHTML = `

<div style="
max-width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
text-align:center;
">

<h2>
Account Deactivated
</h2>

<p>
Your account has been deactivated.
</p>

<p>
Please contact customer support
or submit a reactivation request.
</p>

<textarea
id="reason"
placeholder="Reason"
style="
width:100%;
height:120px;
">
</textarea>

<br><br>

<button
onclick="submitRequest()">
Request Reactivation
</button>

</div>

`;
      return;
   }

   showOtpBox(phone);

}else{
  
 document.getElementById(
 "extraBox"
).innerHTML = `
<input
 id="regName"
 placeholder="Name"
 autocomplete="off">

<input
 id="regEmail"
 placeholder="Email"
 autocomplete="off">
 
<button
 onclick="registerUser()">
 Create Account
</button>
`;
 }

}
  async function registerUser(){

 const phone =
 document.getElementById("phone").value;

 const name =
 document.getElementById("regName").value;

 const email =
 document.getElementById("regEmail").value;

 const res = await fetch(
   API + "/register",
   {
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify({
       name,
       email,
       phone,
     })
   }
 );

 const data =
 await res.json();

 if(data.success){

 showOtpBox(phone);
 }

}
  function showOtpBox(phone){

  alert("OTP : 123456");

document.getElementById("loginModalContent").innerHTML = `

<input
id="otp"
placeholder="Enter OTP"
style="width:100%;box-sizing:border-box;">

<br>

<button onclick="verifyOtp('${phone}')">
Verify OTP
</button>

`;
}
  function verifyOtp(phone){

  const otp =
  document.getElementById("otp").value;

  if(otp === "123456"){
    
    localStorage.setItem(
      "user",
      phone
    );
document.getElementById("loginModal").style.display = "none";
    location.reload();

  }else{

    alert("Invalid OTP");

  }

}
  function submitRequest(){

const phone =
localStorage.getItem(
"reactivationPhone"
);
const reason =
document.getElementById("reason").value;

fetch(
API + "/reactivation-request",
{
 method:"POST",
 headers:{
  "Content-Type":"application/json"
 },
 body:JSON.stringify({
  phone,
  reason
 })
}
)
.then(res=>res.json())
.then((data)=>{

 if(data.alreadyPending){

  document.body.innerHTML = `

  <div style="
  max-width:500px;
  margin:80px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  ">

  <h2 style="color:#f59e0b">
  Request Already Submitted
  </h2>

  <p>
  Your reactivation request is already under review.
  </p>

  <p>
  Please wait for approval.
  </p>

  </div>

  `;

  return;
 }

 document.body.innerHTML = `

 <div style="
 max-width:500px;
 margin:80px auto;
 background:white;
 padding:30px;
 border-radius:12px;
 text-align:center;
 ">

 <h2 style="color:#2563eb">
 Request Submitted
 </h2>

 <p>
 Your reactivation request is being processed.
 </p>

 <p>
 Our support team will review and approve your request shortly.
 </p>

 </div>

 `;

});
}
  
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function goWishlist(){
  location.href = "wishlist.html";
}
// 📦 LOAD ORDERS
function loadOrders(){

  let user = localStorage.getItem("user");

  fetch(API + "/orders")
    .then(res => res.json())
    .then(data => {

    let myOrders = data.filter(o =>
  String(o.user || o.phone) === String(user)
);
      let html = "";

      if(myOrders.length === 0){

        html = `
          <p class='empty'>
            No orders found
          </p>
        `;

      }else{

        myOrders.reverse().forEach(order => {

      const items =
order.products ||
order.items ||
[order.product];
 const item = items[0]; 
 let productsHTML = "";

items.forEach(item => {

productsHTML += `

<div style="
display:flex;
gap:12px;
margin-bottom:12px;
">

<img
src="${
item.primaryImage ||
item.image ||
item.images?.[0]
}"
style="
width:70px;
height:85px;
object-fit:cover;
border-radius:8px;
">

<div>

<div style="
font-size:18px;
font-weight:600;
">
${item.styleNo || item.name}
</div>

<div>
₹${item.price}
</div>

<div>
Size: ${item.size || "-"}
</div>

<div>
Qty: ${item.qty || 1}
</div>

</div>

</div>

`;

});
          
html += `

<div
onclick="openOrder('${order._id}')"
style="
background:#fff;
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-bottom:15px;
cursor:pointer;
display:flex;
gap:20px;
align-items:center;
">

<div style="flex:1;">

${productsHTML}

<div style="
color:#555;
margin-top:6px;
">
Order Confirmed:
${new Date(
  order.orderDate || order.createdAt
).toLocaleDateString("en-IN")}

<br>

${order.status === "Delivered"
? "Delivered On:"
: "Expected Delivery:"}

${order.status === "Delivered"
? new Date(
    order.deliveryDate
  ).toLocaleDateString("en-IN")
:(() => {
  const d = new Date(
    order.orderDate || order.createdAt
  );
  d.setDate(d.getDate() + 4);
  return d.toLocaleDateString("en-IN");
})()
}
</div>

</div>

  <div style="
  font-size:24px;
  color:#888;
  ">
    ›
  </div>

</div>

`;
        });

      }

      document.getElementById("orders").innerHTML = html;

    });

}
  function loadWishlist(){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];
  let html = "";

  if(fav.length === 0){
    html = "<p>No items in wishlist</p>";
  } else {

    fav.forEach(p => {
      html += `
        <div class="card" onclick="openProduct('${p._id || p.id}')">
          <img src="${p.images?.[0] || p.image}" width="80">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>

          <button onclick="event.stopPropagation(); removeItem('${p._id || p.id}')">
            Remove
          </button>
        </div>
      `;
    });

  }

  document.getElementById("wishlistItems").innerHTML = html;

function loadAddress(){

  let user = localStorage.getItem("user");

  // ❌ login இல்லனா block
  if(!user){
    document.getElementById("addressList").innerHTML = "<p class='empty'>Please login</p>";
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  let html = "";

  if(addresses.length === 0){
    html = "<p class='empty'>No address added</p>";
  } else {

    addresses.forEach((a, i) => {
      html += `
       <div class="card"
onclick="selectAddress(${i})"
style="
position:relative;
cursor:pointer;
border:
${localStorage.getItem('selectedAddressIndex') == i
? '2px solid #2874f0'
: '1px solid #ddd'}
;">

          <b>${a.name}</b> (${a.phone})<br>
          ${a.address}, ${a.city}, ${a.state} - ${a.pincode}

          <!-- 🔥 3 DOTS -->
          <div style="position:absolute; top:10px; right:10px;">
           <i class="fa-solid fa-ellipsis-vertical"
onclick="event.stopPropagation(); toggleMenu(${i})"
style="cursor:pointer;"></i>

            <div id="menu${i}" style="display:none; background:#fff; border:1px solid #ddd; padding:5px; position:absolute; right:0;">
              <div onclick="event.stopPropagation(); editAddress(${i})">Edit</div>
              <div onclick="event.stopPropagation(); deleteAddress(${i})"style="color:red;">Delete</div>
            </div>
          </div>

        </div>
      `;
    });

  }

  document.getElementById("addressList").innerHTML = html;
}
function editAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];
  let a = addresses[i];

  document.getElementById("a_name").value = a.name;
  document.getElementById("a_phone").value = a.phone;
  document.getElementById("a_pincode").value = a.pincode;
  document.getElementById("a_city").value = a.city;
  document.getElementById("a_state").value = a.state;
  document.getElementById("a_address").value = a.address;

  document.getElementById("addressForm").style.display = "block";

  editIndex = i;
}

function deleteAddress(i){

  let user = localStorage.getItem("user");

  if(!user){
    alert("Login first ❗");
    return;
  }

  let key = "addresses_" + user;

  let addresses = JSON.parse(localStorage.getItem(key)) || [];

  if(confirm("Delete this address?")){
    addresses.splice(i,1);
    localStorage.setItem(key, JSON.stringify(addresses));
    loadAddress();
  }
}
