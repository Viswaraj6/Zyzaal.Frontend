<script>

const API = "https://fark618-backend.onrender.com";

let productsData = [];
let currentPage = 1;

function getProductsPerPage(){

    if(window.innerWidth <= 768){
        return 20;     // Mobile (2 columns × 10 rows)
    }

    return 50;         // Desktop (5 columns × 10 rows)
}
// 👤 Welcome
document.getElementById("welcome").innerText =
  localStorage.getItem("user") || "Guest";


// ==============================
// ❤️ WISHLIST FUNCTIONS
// ==============================

// Get wishlist
function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

// Check if product is in wishlist
function isFav(id){
  return getFav().some(p => p._id === id);
}
// Toggle wishlist
function toggleFav(i){

  let fav = getFav();
  const p = productsData[i];
  const id = p._id;

const exist = fav.find(item => item._id === id);
  if(exist){
   fav = fav.filter(item => item._id !== id);
  } else {
   fav.push({
  _id: id,
  name: p.name,
  price: p.price,
  image: p.images?.[0] || p.image
});
  }

  localStorage.setItem("fav", JSON.stringify(fav));

  loadProducts(); // refresh UI
}

// ==============================
// 📦 LOAD PRODUCTS
// ==============================
async function loadProducts(){
  try {
    const res = await fetch(API + "/products");
    const data = await res.json();

    productsData = data;

    renderProducts(data);

  } catch(e){
    console.log("Product error", e);
  }
}
// ==============================
// 🔍 OPEN PRODUCT
// ==============================
function openProduct(id){

  location.href = "product.html?id=" + id;

}
function goPage(page){
  window.location.href = page;
}
document.getElementById("searchInput").addEventListener("input",function(e){

currentPage=1;

const value=e.target.value.toLowerCase();

const filtered=productsData.filter(p=>

p.name.toLowerCase().includes(value)

);

renderProducts(filtered);

});
function filterCategory(type, el){

  document.querySelectorAll(".categories button")
    .forEach(btn => btn.classList.remove("active"));

  el.classList.add("active");

  if(type === "all"){
    renderProducts(productsData);
  } else {
    const filtered = productsData.filter(p =>
  p.category && p.category.toLowerCase().includes(type)
);
    currentPage=1;
    renderProducts(filtered);
  }
}
  function renderProducts(data){

    const productsPerPage = getProductsPerPage();

    const totalPages = Math.ceil(data.length / productsPerPage);

    if(currentPage > totalPages){
        currentPage = 1;
    }

    const start = (currentPage-1) * productsPerPage;

    const end = start + productsPerPage;

    const pageProducts = data.slice(start,end);

    let html = "";

    pageProducts.forEach((p)=>{

        const realIndex = productsData.findIndex(x=>x._id===p._id);

        html += `
        <div class="card"
        onclick="openProduct('${p._id}')">

        <div class="fav"
        onclick="event.stopPropagation();toggleFav(${realIndex})">

        <span class="heart">
        ${isFav(p._id) ? "♥" : "♡"}
        </span>

        </div>

        <img src="${p.primaryImage || p.images?.[0] || p.image || 'https://via.placeholder.com/300'}">

        <div class="brand">
        ${p.brand || "Zudora"}
        </div>

        <h4>${p.name}</h4>

        <div class="price">
        ₹${p.price}
        </div>

        </div>
        `;
    });

    html += `
    <div class="pagination">
    `;

    if(currentPage>1){

        html+=`
        <button onclick="changePage(${currentPage-1})">
        Prev
        </button>
        `;

    }

    for(let i=1;i<=totalPages;i++){

        html+=`
        <button
        class="${i===currentPage?'active':''}"
        onclick="changePage(${i})">

        ${i}

        </button>
        `;

    }

    if(currentPage<totalPages){

        html+=`
        <button onclick="changePage(${currentPage+1})">
        Next
        </button>
        `;

    }

    html+=`</div>`;

    document.getElementById("products").innerHTML=html;
}
  function changePage(page){

    currentPage = page;

    renderProducts(productsData);

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}
  fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
// ==============================
// 🎬 LOAD BANNER
// ==============================
async function loadBanner(){
  try{
    const res = await fetch(API + "/banner");
    const data = await res.json();

    let html = "";

    if(data.type === "video"){
      html = `
      <video autoplay muted loop playsinline>
        <source src="${data.videoUrl}">
      </video>`;
    }

  else if(data.type === "slider"){

  html = `
  <button class="banner-arrow left"
  onclick="prevSlide()">❮</button>

  <div class="slider" id="slider">
  `;

  data.images.forEach(img=>{
    html += `<img src="${img}" style="width:100%;height:auto;">`;
  });

  html += `
  </div>

  <button class="banner-arrow right"
  onclick="nextSlide()">❯</button>

  <div class="banner-dots" id="bannerDots"></div>
  `;
}

    document.getElementById("banner").innerHTML = html;
 
    if(data.type === "slider"){

  let dots = "";

  for(let i=0;i<data.images.length;i++){

    dots += `
    <span
    onclick="goSlide(${i})"
    class="${i===0 ? 'active' : ''}">
    </span>
    `;
  }

  document.getElementById("bannerDots").innerHTML = dots;
}
startSlider(data.images.length); 
  }catch(e){
    console.log("Banner error", e);
  }
}
  let currentSlide = 0;
  
function updateSlider(total){

  const slider =
  document.getElementById("slider");

  slider.style.transform =
  `translateX(-${currentSlide * 100}%)`;

  document
  .querySelectorAll("#bannerDots span")
  .forEach((dot,index)=>{

    dot.classList.toggle(
      "active",
      index === currentSlide
    );

  });

}

function nextSlide(){

  const total =
  document.querySelectorAll("#slider img").length;

  currentSlide++;

  if(currentSlide >= total){
    currentSlide = 0;
  }

  updateSlider(total);
}

function prevSlide(){

  const total =
  document.querySelectorAll("#slider img").length;

  currentSlide--;

  if(currentSlide < 0){
    currentSlide = total - 1;
  }

  updateSlider(total);
}

function goSlide(index){

  currentSlide = index;

  updateSlider(
    document.querySelectorAll("#slider img").length
  );

}
  
function startSlider(total){

  setInterval(()=>{

    currentSlide++;

    if(currentSlide >= total){
      currentSlide = 0;
    }

    updateSlider(total);

  },5000);

}
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}
  function openMenu(){

document
.getElementById("sideMenu")
.classList.add("active");

document
.getElementById("overlay")
.classList.add("show");

}

function closeMenu(){

document
.getElementById("sideMenu")
.classList.remove("active");

document
.getElementById("overlay")
.classList.remove("show");

}
updateCartCount();
// ==============================
// 🚀 INIT
// ==============================

loadBanner();
loadProducts();
