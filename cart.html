<script>

try{

  const oldCart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const cleaned = oldCart.map(item => ({

    _id: item._id,

    name: item.name,
    category: item.category || "",
    typeDetail: item.typeDetail || "",

    price: item.price,

    image:
        item.image ||
        item.primaryImage ||
        item.images?.[0],

    qty: item.qty || 1,
    size: item.size || "M",

    deliveryDate:
        item.deliveryDate || ""

}));

  localStorage.setItem(
    "cart",
    JSON.stringify(cleaned)
  );

}catch(e){
  console.log(e);
}

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

 if (cart.length === 0) {

  document.querySelector(".address-box").style.display = "none";
  document.querySelector(".price-box").style.display = "none";

 html = `
<div style="
  background:#fff;
  padding:40px 20px;
  text-align:center;
  border-radius:12px;
">

  <img 
    src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png"
    width="140"
    style="
      margin-bottom:10px;
      animation: cartFloat 2s infinite ease-in-out;
    "
  >

  <h2>Your cart is empty!</h2>

  <button 
    onclick="goHome()"
    style="
      background:#2874f0;
      color:#fff;
      padding:12px 30px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    "
  >
    Shop now
  </button>

</div>
`;
} else {
   const products = window.allProducts || [];

cart = cart.map(item => {

    const p = products.find(x => x._id === item._id);

    if(p){
        item.category = p.category;
    }

    return item;
});

localStorage.setItem("cart", JSON.stringify(cart));
   
    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
<div class="cart-item">
 <img 
  src="${item.primaryImage || item.image || item.images?.[0] || 'https://via.placeholder.com/150'}" 
  class="cart-img"
>
  <div class="cart-details">
  <h3>${item.category || item.name}</h3>
    <p>Size: ${item.size}</p>
    <p class="price">₹${item.price}</p>
    <p style="color:green; font-size:13px;">
    Estimated Delivery:
${item.deliveryDate || "2-5 Days"}
    </p>
    <div class="qty-box">
      Qty:
      <input type="number" min="1" value="${qty}" 
        onchange="updateQty(${index}, this.value)">
    </div>

    <div class="actions">
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  </div>
</div>
`;
    });
  }

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
   document.getElementById("totalFinal").innerText = total;
  loadSuggestedProducts();
}
async function loadSuggestedProducts(){

  const res =
    await fetch("https://fark618-backend.onrender.com/products");

  const products = await res.json();
window.allProducts = products;
  loadCart();
  let recent =
    JSON.parse(localStorage.getItem("recentViewed")) || [];
recent = recent.map(p => {

  const product = products.find(x => x._id === p._id);

  return {

    _id: p._id,
    name: p.name,
    price: p.price,

    category: product?.category || p.category || "",
    typeDetail: product?.typeDetail || p.typeDetail || "",

    image:
      p.image ||
      p.primaryImage ||
      p.images?.[0] ||

});

products

    const totalStock =
        (p.sizeStock || [])
        .reduce((sum, s) => sum + (s.stock || 0), 0);

})
.slice(0,6)
.forEach(p => {
  
    suggestedHTML += `

    style="

        width:100%;
        height:180px;
        object-fit:contain;
      ">

    <p>${p.category || p.typeDetail || "Product"}</p>

      <b>₹${p.price}</b>

      <button
      onclick="event.stopPropagation(); openSizePopup('${p._id}')"
      style="
        width:100%;
        background:#90EE90;
        border:none;
        padding:10px;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
      ">
        Add to Cart
      </button>

    </div>
    `;
  });

  // 🔥 Recent
 recent
.filter(p => {

    const hasImage =
        p.primaryImage ||
        (p.images && p.images.length > 0);

    const product =
        products.find(x => x._id === p._id);

    if(!product) return false;

    const totalStock =
        (product.sizeStock || [])
        .reduce((sum, s) => sum + (s.stock || 0), 0);

    return hasImage && totalStock > 0;

})
.forEach(p => {

    recentHTML += `
    <div onclick="openProduct('${p._id}')"
    style="
      width:160px;
      background:#fff;
      border:1px solid #eee;
      border-radius:8px;

        object-fit:contain;
      ">

     <p>${p.category || p.typeDetail || "Product"}</p>

      <b>₹${p.price}</b>

    </div>
    `;
  });

  document.getElementById("suggestedProducts").innerHTML =
  `
  <div style="
    display:flex;

// UPDATE QTY
function updateQty(index, value) {

  let qty = parseInt(value) || 1;

  const item = cart[index];

  // 🔥 product list la irundhu current product find
const products = window.allProducts || [];

  const product =
    products.find(p => p._id === item._id);

  if(!product){
    return;
  }

  // 🔥 selected size stock
  const stockObj =
    product.sizeStock?.find(
      x => x.size === item.size
    );

  const stock =
    stockObj ? stockObj.stock : 0;

  // ❌ oversell stop
  if(qty > stock){

    alert(
      "Only " +
      stock +
      " stock available"
    );

    qty = stock;
  }

  if(qty < 1){
    qty = 1;
  }

  cart[index].qty = qty;

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  loadCart();
}
// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
   updateCartCount();
  loadCart();
  window.location.reload();
}

    alert("Cart is empty ❌");
    return;
  }

  localStorage.removeItem("checkout"); // 🔥 IMPORTANT FIX

  window.location.href = "checkout.html";
}

  function openProduct(id){

 const products = window.allProducts || [];

  const p = products.find(x => x._id === id);

  localStorage.setItem(
    "selectedProduct",
    JSON.stringify(p)
  );

  window.location.href = "product.html";
}
  function addSuggestedToCart(id){

 const products = window.allProducts || [];

  const product =
    products.find(p => p._id === id);

  if(!product){
    return;
  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const already =
    cart.find(x => x._id === id);

  if(already){

    already.qty =
      (already.qty || 1) + 1;

  }else{
  cart.push({
  _id: product._id,
  ...product,
  qty:1,
  size:"M"
});
  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Added to cart ✅");
}
  let selectedProductId = null;

function openSizePopup(id){

  selectedProductId = id;

 const products = window.allProducts || [];
  const product =
    products.find(p => p._id === id);

  if(!product){
    return;
  }

  const sizeBox =
    document.getElementById("popupSizes");

  let sizes = [];

  // 🔥 pant sizes
  if(
    product.category?.toLowerCase().includes("pant") ||
    product.typeDetail?.toLowerCase().includes("pant")
  ){

    sizes = ["30","32","34","36","38","40"];

  } else {

    // 🔥 shirt sizes
    sizes = ["S","M","L","XL","XXL"];
  }

  sizeBox.innerHTML = "";

  sizes.forEach(size => {

    sizeBox.innerHTML += `
    <button
onclick="chooseSize('${size}')"
style="
  min-width:56px;
  height:42px;
  border-radius:10px;
  border:none;
  background:#ddd;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
">
  ${size}
</button>
    `;
  });

  document.getElementById("sizePopup")
    .style.display = "flex";
}
function closeSizePopup(){

  document.getElementById("sizePopup")
    .style.display = "none";
}
let chosenSize = "";

function chooseSize(size){

  chosenSize = size;

  // எல்லா size buttons reset
  document
    .querySelectorAll("#popupSizes button")
    .forEach(btn => {

      btn.style.background = "#ddd";
      btn.style.color = "#000";
      btn.style.border = "none";

    });

  // selected button highlight
  const buttons =
    document.querySelectorAll("#popupSizes button");

  buttons.forEach(btn => {

    if(btn.innerText === size){

      btn.style.background = "#2874f0";
      btn.style.color = "#fff";
      btn.style.border = "2px solid #0b57d0";

    }
  });

  // continue button show
  document.getElementById(
    "popupContinueBtn"
  ).style.display = "inline-block";
}

 const products = window.allProducts || [];

  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  // ✅ SAME PRODUCT + SAME SIZE CHECK
  const already =
    cart.find(x =>
      x._id === selectedProductId &&
      x.size === size
    );

  // ✅ already irundha qty increase
if(already){

  const stockObj =
    product.sizeStock?.find(
      x => x.size === size
    );

  const stock =
    stockObj ? stockObj.stock : 0;

  if(already.qty >= stock){

    alert(
      "Only " +
      stock +
      " stock available"
    );

    return;
  }

  already.qty =
    (already.qty || 1) + 1;

}
   else {

    // ✅ different size / new product
cart.push({
    _id: product._id,
    name: product.name,
    category: product.category,
    typeDetail: product.typeDetail,
    price: product.price,

    image:
        product.primaryImage ||
        product.images?.[0] ||
        product.image,

    qty: 1,
    size: size,

    deliveryDate:
        localStorage.getItem("deliveryDate") || ""
});
  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  closeSizePopup();

  loadCart(); // 🔥 important

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
  window.location.reload();
} // 🔥 THIS closes selectSize function
  
function goPage(page){
  window.location.href = page;
}

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");

  if(el){
    el.innerText = cart.length;
  }
}

updateCartCount();

setTimeout(() => {

  const loader =
    document.getElementById("loader");

  if(loader){
    loader.style.display = "none";
  }

}, 1500);
</script>
<div id="sizePopup"
style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
">

<div style="
  background:#fff;
  padding:18px 25px;
  border-radius:14px;
  width:520px;
  min-height:180px;
  text-align:center;
">

    <h3>Select Size</h3>

  <div style="
  display:flex;
  flex-direction:column;
  align-items:center;
">

 <div id="popupSizes"
style="
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
  margin:18px 0;
  flex-wrap:nowrap;
"></div>

  <div style="
    display:flex;
    gap:15px;
    margin-top:15px;
  ">

    <button
    id="popupContinueBtn"
    onclick="selectSize(chosenSize)"
    style="
      display:none;
      background:#90EE90;
      color:#000;
      border:none;
      padding:10px 22px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    ">
      Continue
    </button>

    <button
    onclick="closeSizePopup()"
    style="
      background:#ddd;
      color:#000;
      border:none;
      padding:10px 22px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    ">
      Cancel
    </button>

  </div>

</div>
