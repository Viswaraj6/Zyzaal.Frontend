<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  body {
  font-family: 'Segoe UI';
  margin: 0;
  padding: 0px;
  background: #d8f3f0;

   display: flex;            /* 🔥 add */
  flex-direction: column;   /* 🔥 add */
  min-height: 100vh;  
}
 .header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

.menu-left{
  display: flex;
  gap: 15px;
  font-size: 14px;
    width: 100px;
}

.logo-center{
  font-size: 22px;
  font-weight: bold;
   text-align: center;
  flex: 1;
}
/* 🔥 LOGO TEXT */
.logo-text{
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2.5px;
  
}
.menu-right{
  display: flex;
  gap: 15px;
  align-items: center;
   width: 100px;
  justify-content: flex-end;
}

.icon{
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.icon i{
  font-size: 18px;
  color: #111;
  transition: 0.3s;
}

.icon:hover i{
  color: #ff3f6c;  /* 🔥 hover effect */
}
  .icon:hover .fa-heart{
  font-weight: 900;
}
.cart span{
  position: absolute;
  top: -6px;
  right: -8px;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 50%;
}
 .main-wrapper{
  width: 100%;
  max-width: 450px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;              /* ⭐ important */
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
     
body{
  padding-top: 0px; /* header space */
}
    h1 {
      text-align: center;
    }
.address-box{
  background: #fff;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 14px;
}

.change-btn{
  float: right;
  background: #eee;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info {
      flex: 1;
    }

    .actions {
      text-align: right;
    }

  button{
  padding: 12px 18px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  background:#ffcc00;
  color:#000;
}

button:hover{
  background:#f5b800;
}
    .remove {
      background: red;
      color: white;
    }

    .qty {
      width: 50px;
      text-align: center;
    }

    .total-box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .checkout {
      background: green;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
    }
    .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top: 30px;
  margin-bottom: 80px; /* 🔥 important */
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}
.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}    
    
    #footer {
  margin-top: auto;
}
.cart-item{
  display: flex;
  gap: 15px;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.cart-img{
  width: 80px;
  height: 100px;
  object-fit: cover;
  border-radius: 6px;
}

.cart-details{
  flex: 1;
}

.price{
  font-weight: bold;
}
.price-box{
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
.qty-box{
  margin-top: 5px;
}
    .total-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.continue-btn{
  background: #ffcc00;
  border: none;
  padding: 10px 18px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  min-width: 120px;
}

.continue-btn:hover{
  background: #f5b800;
}
.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
    {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  margin: 0;
}
    #main-content {
  flex: 1;
 margin-top: 70px;   
  padding-bottom: 100px; /* 🔥 THIS IS KEY */     
}
    @keyframes cartFloat{

  0%{
    transform: translateY(0px);
  }

  50%{
    transform: translateY(-12px);
  }

  100%{
    transform: translateY(0px);
  }
}
  #loader{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}
.spinner{
  width:55px;
  height:55px;
  border:5px solid #ddd;
  border-top:5px solid #2874f0;
  border-radius:50%;
  animation: spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{

  0%{
    transform: rotate(0deg);
  }

  100%{
    transform: rotate(360deg);
  }
}
  </style>
</head>

<body>
</div>
<div id="header" class="header">
  <div class="menu-left"></div>

  <!-- LOGO CENTER -->
  <div class="logo-center" onclick="goHome()" style="cursor:pointer;">
    <div class="logo-text">
     Zudora
    </div>
  </div>

  <!-- RIGHT ICONS -->
  <div class="menu-right">

    <div class="icon" onclick="goPage('wishlist.html')">
      <i class="fa-regular fa-heart"></i>
    </div>

    <div class="icon" onclick="goPage('account.html')">
      <i class="fa-regular fa-user"></i>
    </div>

    <div class="icon cart" onclick="goPage('cart.html')">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="cartCount">0</span>
    </div>

  </div>

</div>
<div id="main-content">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<div class="address-box">
  <b>Deliver to:</b> <span id="delName"></span>, <span id="delPin"></span>
  <button class="change-btn" onclick="changeAddress()">Change</button>
  <p id="delAddress"></p>
</div>
<div id="cartList"></div>

<div class="price-box">
  <h3>Price Details</h3>

  <p>Price: ₹<span id="total"></span></p>
  <p>Discount: ₹0</p>
  <p>Delivery: ₹0</p>

  <hr>
  <div class="total-row">
  <h2>Total Amount: ₹<span id="totalFinal"></span></h2>
  <button class="continue-btn" onclick="checkout()">Continue</button>
</div>
</div>
   <div style="
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
">

  <h3>Suggested for You</h3>

  <p style="color:gray;">
    Based on Your Activity
  </p>

  <div id="loader">

    <div class="spinner"></div>

    <p>Loading products...</p>

  </div>

  <div id="suggestedProducts"></div>

</div>

<div style="
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
">

  <h3>Recently Viewed</h3>

  <div id="recentProducts"></div>
  </div>
<div id="footer"></div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

 if (cart.length === 0) {

  document.querySelector(".address-box").style.display = "none";
  document.querySelector(".price-box").style.display = "none";

 html = `
<div style="
  background:#fff;
  padding:40px 20px;
  text-align:center;
  border-radius:12px;
">

  <img 
    src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png"
    width="140"
    style="
      margin-bottom:10px;
      animation: cartFloat 2s infinite ease-in-out;
    "
  >

  <h2>Your cart is empty!</h2>

  <button 
    onclick="goHome()"
    style="
      background:#2874f0;
      color:#fff;
      padding:12px 30px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    "
  >
    Shop now
  </button>

</div>
<div style="
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
">

  <h3>Suggested for You</h3>

  <p style="color:gray;">
    Based on Your Activity
  </p>
<div id="loader">

  <div class="spinner"></div>

  <p>Loading products...</p>

</div>

  <div id="suggestedProducts"></div>

</div>

<div style="
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
">

  <h3>Recently Viewed</h3>
</div>

  <div id="suggestedProducts"></div>

</div>
  <div id="recentProducts"></div>

</div>
`;
} else {

    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
<div class="cart-item">
 <img 
  src="${item.image || item.images?.[0] || 'https://via.placeholder.com/150'}" 
  class="cart-img"
>
  <div class="cart-details">
    <h3>${item.name}</h3>
    <p>Size: ${item.size}</p>
    <p class="price">₹${item.price}</p>
    <p style="color:green; font-size:13px;">
    Estimated Delivery:
${item.deliveryDate || "2-5 Days"}
    </p>
    <div class="qty-box">
      Qty:
      <input type="number" min="1" value="${qty}" 
        onchange="updateQty(${index}, this.value)">
    </div>

    <div class="actions">
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  </div>
</div>
`;
    });
  }

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
   document.getElementById("totalFinal").innerText = total;
  loadSuggestedProducts();
}
function loadSuggestedProducts(){

  let products =
    JSON.parse(localStorage.getItem("products")) || [];

  let recent =
    JSON.parse(localStorage.getItem("recentViewed")) || [];

  let suggestedHTML = "";
  let recentHTML = "";

  products.slice(0,6).forEach(p => {

    suggestedHTML += `
    <div onclick="openProduct('${p._id}')"
    style="
      width:160px;
      background:#fff;
      border:1px solid #eee;
      border-radius:8px;
      padding:10px;
      cursor:pointer;
      flex-shrink:0;
    ">

      <img 
      src="${p.images?.[0] || p.image}"
      style="
        width:100%;
        height:180px;
        object-fit:contain;
      ">

      <p>${p.name}</p>

      <b>₹${p.price}</b>

      <button
      onclick="event.stopPropagation(); openSizePopup('${p._id}')"
      style="
        width:100%;
        background:#ffcc00;
        border:none;
        padding:10px;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
      ">
        Add to Cart
      </button>

    </div>
    `;
  });

  recent.forEach(p => {

    recentHTML += `
    <div onclick="openProduct('${p._id}')"
    style="
      width:160px;
      background:#fff;
      border:1px solid #eee;
      border-radius:8px;
      padding:10px;
      cursor:pointer;
      flex-shrink:0;
    ">

      <img 
      src="${p.images?.[0] || p.image}"
      style="
        width:100%;
        height:180px;
        object-fit:contain;
      ">

      <p>${p.name}</p>

      <b>₹${p.price}</b>

      <button
      onclick="event.stopPropagation(); openSizePopup('${p._id}')"
      style="
        width:100%;
        background:#ffcc00;
        border:none;
        padding:10px;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
      ">
        Add to Cart
      </button>

    </div>
    `;
  });

  const suggestedEl =
    document.getElementById("suggestedProducts");

  const recentEl =
    document.getElementById("recentProducts");

  if(suggestedEl){

    suggestedEl.innerHTML =
    `<div style="
      display:flex;
      gap:15px;
      overflow:auto;
    ">
      ${suggestedHTML}
    </div>`;
  }

  if(recentEl){

    recentEl.innerHTML =
    `<div style="
      display:flex;
      gap:15px;
      overflow:auto;
    ">
      ${recentHTML}
    </div>`;
  }
}

// UPDATE QTY
function updateQty(index, value) {
  cart[index].qty = parseInt(value) || 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}


// CHECKOUT
function checkout() {

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;
  }

  localStorage.removeItem("checkout"); // 🔥 IMPORTANT FIX

  window.location.href = "checkout.html";
}
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
// NAVIGATION
function goHome() {
  window.location.href = "/";
}

function goAccount() {
  window.location.href = "account.html";
}

function goCart() {
  window.location.href = "cart.html";
}

function loadDefaultAddress(){

  let user = localStorage.getItem("user");

let addresses =
  JSON.parse(localStorage.getItem("addresses_" + user)) || [];
  if(addresses.length === 0){
    document.getElementById("delName").innerText = "No address";
    document.getElementById("delPin").innerText = "";
    document.getElementById("delAddress").innerText = "Add address in account page";
    return;
  }

  // 🔥 first address default
  const selectedIndex =
  localStorage.getItem("selectedAddressIndex") || 0;

let a = addresses[selectedIndex];

  document.getElementById("delName").innerText = a.name;
  document.getElementById("delPin").innerText = a.pincode;
  document.getElementById("delAddress").innerText =
    a.address + ", " + a.city + ", " + a.state;
}
 function changeAddress(){

  localStorage.setItem(
    "addressReturnPage",
    "cart.html"
  );

  window.location.href =
    "account.html#addressSection";
}
// INIT
loadCart();
loadDefaultAddress(); 
  function openProduct(id){

  const products =
    JSON.parse(localStorage.getItem("products")) || [];

  const p = products.find(x => x._id === id);

  localStorage.setItem(
    "selectedProduct",
    JSON.stringify(p)
  );

  window.location.href = "product.html";
}
  function addSuggestedToCart(id){

  const products =
    JSON.parse(localStorage.getItem("products")) || [];

  const product =
    products.find(p => p._id === id);

  if(!product){
    return;
  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const already =
    cart.find(x => x._id === id);

  if(already){

    already.qty =
      (already.qty || 1) + 1;

  }else{

    cart.push({
      ...product,
      qty:1,
      size:"M"
    });
  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Added to cart ✅");
}
  let selectedProductId = null;

function openSizePopup(id){

  selectedProductId = id;

  document.getElementById("sizePopup")
    .style.display = "flex";
}

function closeSizePopup(){

  document.getElementById("sizePopup")
    .style.display = "none";
}

function selectSize(size){

  const products =
    JSON.parse(localStorage.getItem("products")) || [];

  const product =
    products.find(p => p._id === selectedProductId);

  if(!product){
    return;
  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const already =
    cart.find(x =>
      x._id === selectedProductId &&
      x.size === size
    );

  if(already){

    already.qty =
      (already.qty || 1) + 1;

  } else {

    cart.push({
      ...product,
      image: product.images?.[0] || product.image,
      qty:1,
      size:size,
      deliveryDate:
        localStorage.getItem("deliveryDate") || ""
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  alert("Added to cart ✅");
  updateCartCount();

closeSizePopup();

// 🔥 scroll top
window.scrollTo({
  top: 0,
  behavior: "smooth"
});

// 🔥 reload cart
setTimeout(() => {

  loadCart();

}, 300);

} // 🔥 THIS closes selectSize function
function goPage(page){
  window.location.href = page;
}

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cartCount");

  if(el){
    el.innerText = cart.length;
  }
}

updateCartCount();

setTimeout(() => {

  const loader =
    document.getElementById("loader");

  if(loader){
    loader.style.display = "none";
  }

}, 1500);
</script>
<div id="sizePopup"
style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
  ">

    <h3>Select Size</h3>

    <div style="
      display:flex;
      gap:10px;
      justify-content:center;
      margin:20px 0;
    ">

      <button onclick="selectSize('S')">S</button>
      <button onclick="selectSize('M')">M</button>
      <button onclick="selectSize('L')">L</button>
      <button onclick="selectSize('XL')">XL</button>
      <button onclick="selectSize('XXL')">XXL</button>
    </div>

    <button onclick="closeSizePopup()"
    style="
      background:#ddd;
      color:#000;
    ">
      Cancel
    </button>

  </div>

</div>
</body>
</html>
