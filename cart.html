100%{

<script>
const API = "https://fark618-backend.onrender.com";
try{

  const oldCart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const cleaned = oldCart.map(item => ({

    _id: item._id,

    name: item.name,
    category: item.category || "",
    typeDetail: item.typeDetail || "",

    price: item.price,

    image:
        item.image ||
        item.primaryImage ||
        item.images?.[0],

    qty: item.qty || 1,
    size: item.size || "M",

    deliveryDate:
        item.deliveryDate || ""

}));

  localStorage.setItem(
    "cart",
    JSON.stringify(cleaned)
  );

}catch(e){
  console.log(e);
}

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

// LOAD CART
function loadCart() {

  let html = "";
  let total = 0;

 if (cart.length === 0) {

  document.querySelector(".address-box").style.display = "none";
  document.querySelector(".price-box").style.display = "none";

 html = `
<div class="empty-cart-box">

   
 <img src="images/shirt.png" class="shirt-drop">

<img src="images/pant.png" class="pant-drop">

<img
    class="bag-img"
    src="images/bag.png"
>

    <h2>Your Bag is Waiting 🛍️</h2>

    <p>
        Looks like you haven't added
        anything yet.
    </p>

    <button onclick="goHome()">
        Continue Shopping
    </button>

</div>
`;
} else {
   const products = window.allProducts || [];

cart = cart.map(item => {

    const p = products.find(x => x._id === item._id);

    if(p){
        item.category = p.category;
    }

    return item;
});

localStorage.setItem("cart", JSON.stringify(cart));
   
    cart.forEach((item, index) => {

      let qty = item.qty || 1;
      let itemTotal = item.price * qty;
      total += itemTotal;

      html += `
<div class="cart-item">
 <img 
  src="${item.primaryImage || item.image || item.images?.[0] || 'https://via.placeholder.com/150'}" 
  class="cart-img"
>
  <div class="cart-details">
 <h3>${(item.category || item.name)
      .toLowerCase()
      .replace(/\b\w/g, c => c.toUpperCase())}</h3>
    <p>Size: ${item.size}</p>
    <p class="price">₹${item.price}</p>
    <p style="color:green; font-size:13px;">
    Estimated Delivery:
${item.deliveryDate || "2-5 Days"}
    </p>
   <div class="qty-box">
  Qty:
  <select onchange="updateQty(${index}, this.value)">
    ${
      (() => {

        const product =
          (window.allProducts || []).find(
            p => p._id === item._id
          );

        const stock =
          product?.sizeStock?.find(
            s => s.size === item.size
          )?.stock || 1;

        let options = "";

        for(let i = 1; i <= stock; i++){

          options += `
            <option
              value="${i}"
              ${qty == i ? "selected" : ""}
            >
              ${i}
            </option>
          `;

        }

        return options;

      })()
    }
  </select>
</div>

    <div class="actions">
      <button onclick="removeItem(${index})">Remove</button>
    </div>
  </div>
</div>
`;
    });
  }

  document.getElementById("cartList").innerHTML = html;

const priceBox = document.querySelector(".price-box");

if(cart.length === 0){
    priceBox.style.display = "none";
}else{
    priceBox.style.display = "block";
    document.getElementById("total").innerText = total;
    document.getElementById("totalFinal").innerText = total;
}
  
}
async function loadSuggestedProducts(){

window.allProducts = products;

recent = recent.map(p => {

});
  let suggestedHTML = "";

products

      <b>₹${p.price}</b>

      <button

        font-weight:bold;
        cursor:pointer;
      ">

  document.getElementById("suggestedProducts").innerHTML =
`

display:flex;
gap:15px;
overflow:auto;
">
${suggestedHTML}
</div>
`;
  
}

}
  
// UPDATE QTY
function updateQty(index, value) {

  let qty = parseInt(value) || 1;

  const item = cart[index];

  // 🔥 product list la irundhu current product find
const products = window.allProducts || [];

  const product =
    products.find(p => p._id === item._id);

  if(!product){
    return;
  }

  // 🔥 selected size stock
  const stockObj =
    product.sizeStock?.find(
      x => x.size === item.size
    );

  const stock =
    stockObj ? stockObj.stock : 0;

  // ❌ oversell stop
  if(qty > stock){

    alert(
      "Only " +
      stock +
      " stock available"
    );

    qty = stock;
  }

  if(qty < 1){
    qty = 1;
  }

  cart[index].qty = qty;

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  loadCart();
}
// REMOVE ITEM
function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    loadCart();

    loadSuggestedProducts();   // optional
}

  if (cart.length === 0) {
    alert("Cart is empty ❌");
    return;

  localStorage.removeItem("checkout"); // 🔥 IMPORTANT FIX

  window.location.href = "checkout.html";
}

  let selectedProductId = null;

function openSizePopup(id){

  selectedProductId = id;

 const products = window.allProducts || [];
  const product =
    products.find(p => p._id === id);

  if(!product){
    return;
  }

  const sizeBox =
    document.getElementById("popupSizes");

  let sizes = [];

  // 🔥 pant sizes
  if(
    product.category?.toLowerCase().includes("pant") ||
    product.typeDetail?.toLowerCase().includes("pant")
  ){

    sizes = ["30","32","34","36","38","40"];

  } else {

    // 🔥 shirt sizes
    sizes = ["S","M","L","XL","XXL"];
  }

  sizeBox.innerHTML = "";

  sizes.forEach(size => {

    sizeBox.innerHTML += `
    <button
onclick="chooseSize('${size}')"
style="
  min-width:56px;
  height:42px;
  border-radius:10px;
  border:none;
  background:#ddd;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
">
  ${size}
</button>
    `;
  });

  document.getElementById("sizePopup")
    .style.display = "flex";
}
function closeSizePopup(){

  document.getElementById("sizePopup")
    .style.display = "none";
}
let chosenSize = "";

function chooseSize(size){

  chosenSize = size;

  // எல்லா size buttons reset
  document
    .querySelectorAll("#popupSizes button")
    .forEach(btn => {

      btn.style.background = "#ddd";
      btn.style.color = "#000";
      btn.style.border = "none";

    });

  // selected button highlight
  const buttons =
    document.querySelectorAll("#popupSizes button");

  buttons.forEach(btn => {

    if(btn.innerText === size){

      btn.style.background = "#2874f0";
      btn.style.color = "#fff";
      btn.style.border = "2px solid #0b57d0";

    }
  });

  // continue button show
  document.getElementById(
    "popupContinueBtn"
  ).style.display = "inline-block";
}
function selectSize(size){

 const products = window.allProducts || [];
  const product =
    products.find(p => p._id === selectedProductId);

  if(!product){
    return;
  }

  cart = JSON.parse(localStorage.getItem("cart")) || [];

  // ✅ SAME PRODUCT + SAME SIZE CHECK
  const already =
    cart.find(x =>
      x._id === selectedProductId &&
      x.size === size
    );

  // ✅ already irundha qty increase
if(already){

  const stockObj =
    product.sizeStock?.find(
      x => x.size === size
    );

  const stock =
    stockObj ? stockObj.stock : 0;

  if(already.qty >= stock){

    alert(
      "Only " +
      stock +
      " stock available"
    );

    return;
  }

  already.qty =
    (already.qty || 1) + 1;

}
   else {

    // ✅ different size / new product
cart.push({
    _id: product._id,
    name: product.name,
    category: product.category,
    typeDetail: product.typeDetail,
    price: product.price,

    image:
        product.primaryImage ||
        product.images?.[0] ||
        product.image,

    qty: 1,
    size: size,

    deliveryDate:
        localStorage.getItem("deliveryDate") || ""
});
  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  closeSizePopup();

  loadCart(); // 🔥 important

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
 loadCart();
updateCartCount();
closeSizePopup();
} // 🔥 THIS closes selectSize function
