
<style>
    /* HEADER */
html,
body{
    margin:0;
    padding:0;
}
.top-header{
  position:relative;
    top:0;
    width:100%;
    z-index:9999;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    margin-top:0;
}

/* Logo Background */

.logo-wrap{
    background:#A8DDD0;
    height:95px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.site-logo{
    height:72px;
    width:auto;
}

/* Search + Icons */

.top-nav{
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:10;
    background:transparent;
}

.search-bar{
    width:180px;
    flex:none;
    margin:0;
}
.search-bar input{
    width:100%;
    height:40px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:0 15px;
    font-size:15px;
    background:#fff;
}
.nav-icons{
    display:flex;
    align-items:center;
    gap:22px;
    margin-left:auto;
}

.icon{
    position:relative;
    cursor:pointer;
    font-size:22px;
}

.cart span{
    position:absolute;
    top:-6px;
    right:-8px;
    background:red;
    color:#fff;
    border-radius:50%;
    padding:2px 5px;
    font-size:10px;
}

.back-btn{
    display:none;
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#111;
    z-index:999999;
    pointer-events:auto;
}
    
.back-btn i{
    font-size:26px;
}
    .back-icon{
    font-size:24px;
    transform:rotate(-90deg);
}

/* Mobile */

@media(max-width:768px){

.logo-wrap{
    height:64px;
     position:relative;
}

.site-logo{
    height:46px;
}

.top-nav{
    padding:10px;
     pointer-events:none;
}
.back-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.12);
}
.search-bar{
    display:none;
    pointer-events:auto;
}

.nav-icons{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    gap:8px;
    pointer-events:auto;
}

.icon{
    font-size:22px;
}

}
</style>

<div class="top-header">

    <!-- Logo -->
    <div class="logo-wrap">

       <div class="back-btn" onclick="goBack()">
   <i class="fa-solid fa-arrow-turn-up" style="transform:rotate(-90deg);"></i>
</div>
        
        <img src="images/zyzaal_logo_transparent.png"
             class="site-logo"
             onclick="goPage('index.html')"
             style="cursor:pointer;"
             alt="Zyzaal Logo">

    </div>

    <!-- Search + Icons -->
    <div class="top-nav">

        <div class="search-bar">
            <input type="text"
                   placeholder="Search for products..."
                   readonly
                   onclick="goPage('index.html')">
        </div>

        <div class="nav-icons">

            <div class="icon" onclick="goPage('account.html')">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="icon" onclick="goPage('wishlist.html')">
                <i class="fa-regular fa-heart"></i>
            </div>

            <div class="icon cart" onclick="goPage('cart.html')">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cartCount">0</span>
            </div>

        </div>

    </div>

</div>
<script>
function goBack() {

    if (document.referrer &&
        document.referrer.includes(location.hostname)) {

        window.history.back();

    } else {

        window.location.href = "index.html";

    }

}
</script>
