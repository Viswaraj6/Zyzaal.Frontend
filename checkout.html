<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FARK 618</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe9f3);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 520px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
.steps{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:20px;
}

.step{
  padding:10px 15px;
  border-radius:20px;
  background:#ddd;
}

.step.active{
  background:#2874f0;
  color:#fff;
}

.step-box{
  width:100%;
  max-width:100%;
  margin:auto;
  background:#fff;
  padding:0;
  border-radius:10px;
  box-sizing:border-box;
}
    #summaryAddressBox{
  width:100%;
}

#summaryAddressBox > div{
  width:100%;
  box-sizing:border-box;
}
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea { height: 80px; }

    .total {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      color: green;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
<!-- TOP PRODUCT (optional preview) -->
<div id="productBoxTop" style="margin-bottom:15px;"></div>

<div class="container">

  <div class="steps">
    <div class="step active">Address</div>
    <div class="step">Order Summary</div>
    <div class="step">Payment</div>
  </div>

 <!-- STEP 1 -->
<div id="step1" class="step-box">

  <h3>Delivery Address</h3>

  <!-- 🔥 ADD THIS -->
  <div id="savedAddressBox"></div>

  <!-- 🔥 WRAP INPUTS -->
  <div id="addressForm">

    <input id="name" placeholder="Full Name">

    <input id="phone" placeholder="Phone Number">

    <textarea id="address" placeholder="Address"></textarea>

  </div>

  <button onclick="goStep2()">Continue</button>

</div>
  <!-- STEP 2 -->
 <div id="step2" class="step-box" style="display:none;">

  <div id="summaryAddressBox"></div>

  <h3>Order Summary</h3>

  <div id="productBox"></div>
    <h3>Total: ₹<span id="totalAmount"></span></h3>

    <button onclick="goStep3()">Continue</button>
  </div>

<!-- STEP 3 -->
<div id="step3" class="step-box" style="display:none;">

  <h3>Payment Details</h3>

  <div style="
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
  ">

    <!-- ONLINE -->
    <div onclick="selectPayment('online')"
    id="onlineBox"
    style="
      padding:15px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      background:#fff;
    ">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">
        <b>UPI / Card / Net Banking</b>

        <input type="radio"
        name="payment"
        checked>
      </div>

      <p style="
        margin:8px 0 0;
        color:gray;
        font-size:13px;
      ">
        Pay securely using Razorpay
      </p>

    </div>

    <!-- COD -->
    <div onclick="selectPayment('cod')"
    id="codBox"
    style="
      padding:15px;
      cursor:pointer;
      background:#fff;
    ">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">
        <b>Cash on Delivery</b>

        <input type="radio"
        name="payment">
      </div>

      <p style="
        margin:8px 0 0;
        color:gray;
        font-size:13px;
      ">
        Pay when your order arrives
      </p>

    </div>

  </div>

  <!-- ACTION BUTTON -->
  <button
  id="placeOrderBtn"
  onclick="payNow()"
  style="
    background:#ffcc00;
    color:#000;
    margin-top:20px;
  ">
    Pay Now
  </button>

</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const API = "https://fark618-backend.onrender.com";
let selectedPayment = "online";
// 🧮 CART / BUY NOW

let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

let checkoutItem =
  JSON.parse(localStorage.getItem("checkout"));

let products = [];
let total = 0;

// ✅ CART PRODUCTS
if(cart.length > 0){

  products = cart;

  cart.forEach(i => {
    total += i.price * (i.qty || 1);
  });

}

// ✅ BUY NOW PRODUCT
else if(checkoutItem){

  products = [checkoutItem];

  total = checkoutItem.price;

}
  document.getElementById("totalAmount").innerText = total;
function loadSelectedAddress(){

  const user = localStorage.getItem("user");

  if(!user) return;

  const addresses =
    JSON.parse(localStorage.getItem("addresses_" + user)) || [];

  if(addresses.length === 0) return;

  const selectedIndex =
    localStorage.getItem("selectedAddressIndex") || 0;

  const a = addresses[selectedIndex];

  // 🔥 AUTO FILL
  document.getElementById("name").value =
    a.name || "";

  document.getElementById("phone").value =
    a.phone || "";

  document.getElementById("address").value =
    `${a.address},
${a.city},
${a.state} - ${a.pincode}`;

  // 🔥 ADDRESS CARD
  document.getElementById("savedAddressBox").innerHTML = `
    <div style="
      border:1px solid #ddd;
      padding:12px;
      border-radius:8px;
      margin-bottom:15px;
      background:#fff;
      position:relative;
    ">

      <button onclick="changeCheckoutAddress()"
      style="
        position:absolute;
        right:10px;
        top:10px;
        border:none;
        background:none;
        color:#2874f0;
        font-weight:600;
        cursor:pointer;
      ">
        Change
      </button>

      <b>${a.name}</b>
      (${a.phone})<br><br>

      ${a.address},
      ${a.city},
      ${a.state} - ${a.pincode}

    </div>
  `;

  // 🔥 HIDE FORM
  document.getElementById("addressForm").style.display =
    "none";
  // ✅ DIRECT ORDER SUMMARY
document.getElementById("step1").style.display = "none";
document.getElementById("step2").style.display = "block";

// ✅ STEP ACTIVE
const steps = document.querySelectorAll(".step");

steps[0].classList.remove("active");
steps[1].classList.add("active");

// ✅ SUMMARY ADDRESS
document.getElementById("summaryAddressBox").innerHTML = `
  <div style="
    border:1px solid #ddd;
    border-radius:10px;
    padding:12px;
    margin-bottom:20px;
    background:#f8f8f8;
    position:relative;
  ">

    <button onclick="changeCheckoutAddress()"
    style="
      position:absolute;
      right:10px;
      top:10px;
      border:none;
      background:none;
      color:#2874f0;
      font-weight:600;
      cursor:pointer;
    ">
      Change
    </button>

    <p style="
      margin:0;
      font-size:13px;
      color:gray;
    ">
      Deliver to:
    </p>

    <p style="
      margin:6px 0;
      font-weight:bold;
    ">
      ${a.name} (${a.phone})
    </p>

    <p style="
      margin:0;
      line-height:1.5;
      white-space:pre-line;
    ">
      ${a.address},
      ${a.city},
      ${a.state} - ${a.pincode}
    </p>

  </div>
`;
}
  function changeCheckoutAddress(){

  localStorage.setItem(
    "addressReturnPage",
    "checkout.html"
  );

  window.location.href =
    "account.html#addressSection";
}
function goStep2(){

  if(!validateStep1()) return;

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";

  const steps = document.querySelectorAll(".step");

  steps[0].classList.remove("active");
  steps[1].classList.add("active");

  // 🔥 ADDRESS SUMMARY
  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const address =
    document.getElementById("address").value;

  document.getElementById("summaryAddressBox").innerHTML = `
  
    <div style="
      border:1px solid #ddd;
      border-radius:10px;
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin-bottom:20px;
      background:#f8f8f8;
      position:relative;
    ">

      <div style="
        position:absolute;
        right:12px;
        top:12px;
        color:green;
        font-size:22px;
        font-weight:bold;
      ">
      </div>

      <p style="
        margin:0;
        font-size:13px;
        color:gray;
      ">
        Deliver to:
      </p>

      <p style="
        margin:6px 0;
        font-weight:bold;
      ">
        ${name} (${phone})
      </p>

     <p style="
  margin:0;
  line-height:1.5;
  word-break:break-word;
  overflow-wrap:break-word;
  white-space:pre-line;
">
  ${address}
</p>

    </div>
  `;
}
function goStep3(){

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";

  const steps = document.querySelectorAll(".step");

  steps[1].classList.remove("active");
  steps[2].classList.add("active");
}
function selectPayment(type){
selectedPayment = type;
  const radios =
    document.querySelectorAll('input[name="payment"]');

  const btn =
    document.getElementById("placeOrderBtn");

  if(type === "online"){

    radios[0].checked = true;

    btn.innerText = "Pay Now";
    btn.onclick = payNow;

  } else {

    radios[1].checked = true;

    btn.innerText = "Place Order";
    btn.onclick = cashOnDelivery;
  }
}
function validateStep1(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all fields ❗");
    return false;
  }
  return true;
}
// 🔥 VALIDATION + DATA
function getUserData() {

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    alert("Fill all fields ❗");
    return null;
  }

  if (phone.length < 10) {
    alert("Enter valid phone ❗");
    return null;
  }

  if (total === 0) {
    alert("Cart empty ❌");
    return null;
  }

  return { name, phone, address };
}


// 💳 ONLINE PAYMENT
function payNow() {
document.getElementById("paymentLoader")
.style.display = "flex";
  let data = getUserData();
  if (!data) return;

  fetch(API + "/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount: total})
  })
  .then(res => res.json())
  .then(order => {
  if(!order.id){

  document.getElementById("paymentLoader")
  .style.display = "none";

  alert("Payment setup missing ❌");

  return;
}

    var options = {
      key: "rzp_test_SfD9BzINtp65Kb",
      amount: order.amount,
      currency: "INR",
      name: "Zudora",
      description: "Order Payment",
      order_id: order.id,
      modal: {
     ondismiss: function () {

     document.getElementById("paymentLoader")
    .style.display = "none";

  }
},
      handler: function (response) {

        fetch(API + "/verify-payment", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(result => {

          if (result.success) {

            saveOrder(data, "Paid", response.razorpay_payment_id);

          } else {
            alert("Payment verification failed ❌");
          }

        });

      }
    };

    new Razorpay(options).open();

  })
 .catch(() => {

  document.getElementById("paymentLoader")
  .style.display = "none";

  alert("Server error ❌");

});
}


// 🚚 COD
function cashOnDelivery() {
document.getElementById("paymentLoader")
.style.display = "flex";
  let data = getUserData();
  if (!data) return;

  saveOrder(data, "Pending", "COD");
}


// 💾 SAVE ORDER
function saveOrder(userData, status, paymentId) {

  fetch(API + "/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user: localStorage.getItem("user") || "guest",
      name: userData.name,
      phone: userData.phone,
      address: userData.address,
     products: products,
      total,
      paymentId,
     paymentStatus:
status === "Paid"
? "Paid"
: "Pending",

paymentMethod:
paymentId === "COD"
? "Cash on Delivery"
: "Online Payment",

status: "Pending",

orderDate: new Date(),

deliveryDate:
window.selectedDeliveryDate ||
localStorage.getItem("deliveryDate") ||
""
    })
  })
.then(async(res) => {

  const data = await res.json();

  console.log(data);

  if(!res.ok){

    document.getElementById("paymentLoader")
    .style.display = "none";

    alert("Order failed ❌");

    return;
  }

  alert("Order placed ✅");

  localStorage.removeItem("cart");

  window.location.href = "account.html";

})
  .catch(() => alert("Order save failed ❌"));
}
// 🖼 SHOW PRODUCT
if(products.length > 0){
  let html = "";

  products.forEach(p => {

  const delivery = p.deliveryDate && p.deliveryDate !== ""
  ? p.deliveryDate
  : "Check pincode in product page";

   html += `
<div style="
display:flex;
gap:15px;
align-items:flex-start;
margin-bottom:20px;
padding-bottom:15px;
border-bottom:1px solid #eee;
">

<img
src="${p.primaryImage || p.images?.[0] || p.image}"
style="
width:80px;
height:100px;
object-fit:cover;
border-radius:8px;
"
>

<div style="flex:1;">

<p style="
margin:0 0 6px;
font-weight:600;
font-size:16px;
">
${p.name}
</p>

<b style="
font-size:20px;
">
₹${p.price}
</b>

<p style="
margin:6px 0;
font-size:14px;
">
Size: ${p.size || "-"}
</p>

<p style="
margin:0;
color:green;
font-size:13px;
">
Delivery by ${delivery}
</p>

</div>
</div>
`;
  });

  document.getElementById("productBox").innerHTML = html;
}
  loadSelectedAddress();
</script>
<div id="paymentLoader"
style="
position:fixed;
inset:0;
background:rgba(255,255,255,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
flex-direction:column;
">

  <div style="
    display:flex;
    gap:10px;
    margin-bottom:15px;
  ">

    <div class="pay-dot"></div>
    <div class="pay-dot"></div>
    <div class="pay-dot"></div>
    <div class="pay-dot"></div>

  </div>

  <p style="
    font-size:16px;
    font-weight:600;
    color:#333;
  ">
    Processing...
  </p>

</div>

<style>
.pay-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#2874f0;
  animation:bounce 0.6s infinite alternate;
}

.pay-dot:nth-child(2){
  animation-delay:0.15s;
}

.pay-dot:nth-child(3){
  animation-delay:0.3s;
}

.pay-dot:nth-child(4){
  animation-delay:0.45s;
}

@keyframes bounce{

  from{
    transform:translateY(0);
    opacity:0.5;
  }

  to{
    transform:translateY(-10px);
    opacity:1;
  }
}
</style>
</body>
</html>
