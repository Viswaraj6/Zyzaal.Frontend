<script>

const BASE_URL = "https://fark618-backend.onrender.com";

/* LOGIN CHECK */
if(!localStorage.getItem("adminToken")){

  window.location.href = "admin-login.html";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");

}

/* SIZE LOAD */
document.getElementById("type").addEventListener("change", loadSizeOptions);

function loadSizeOptions(){

  const type =
    document.getElementById("type").value;

  let sizes =
    type === "shirt"
    ? ["S","M","L","XL","XXL"]
    : ["30","32","34","36","38","40"];

  let html = `
  <h3 style="margin-bottom:20px;">
    Size Stock
  </h3>
  `;

  sizes.forEach(s => {

    html += `

    <div style="
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:14px;
    background:#f9fafb;
    padding:12px;
    border-radius:10px;
    ">

      <div style="
      width:70px;
      font-weight:600;
      font-size:16px;
      ">
      ${s}
      </div>

      <input
      type="number"
      id="stock-${s}"
      placeholder="Enter stock"
      min="0"
      style="
      width:120px;
      "
      >

    </div>
    `;
  });

  document.getElementById("sizeBox").innerHTML = html;
}

loadSizeOptions();

/* TOGGLE STOCK */
function toggleStock(cb){
  const input = document.getElementById("stock-" + cb.value);
  input.style.display = cb.checked ? "inline-block" : "none";
}
document.getElementById("imageFiles").addEventListener("change", function(e){

  const files = e.target.files;
  const preview = document.getElementById("previewBox");

  preview.innerHTML = "";

  for(let i=0; i<files.length; i++){

    const reader = new FileReader();

    reader.onload = function(ev){

      const img = document.createElement("img");
      img.src = ev.target.result;

      img.style.width = "80px";
      img.style.height = "100px";
      img.style.objectFit = "cover";
      img.style.borderRadius = "6px";
      img.style.border = "1px solid #ccc";

      preview.appendChild(img);
    };

    reader.readAsDataURL(files[i]);
  }

});
/* ADD PRODUCT */
async function addProduct(){

  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const type = document.getElementById("type").value;
  const category = document.getElementById("category").value;

  const brand = document.getElementById("brand").value;
  const fabric = document.getElementById("fabric").value;
  const typeDetail = document.getElementById("typeDetail").value;
  const fit = document.getElementById("fit").value;
  const pattern = document.getElementById("pattern").value;
  const color = document.getElementById("color").value;
  const occasion = document.getElementById("occasion").value;
  const description = document.getElementById("description").value;

const sizes =
type === "shirt"
? ["S","M","L","XL","XXL"]
: ["30","32","34","36","38","40"];

const sizeStock = [];

sizes.forEach(size => {

  const val =
    document.getElementById("stock-" + size).value;

  if(val && Number(val) > 0){

    sizeStock.push({
      size,
      stock:Number(val)
    });

  }

});
  const files = document.getElementById("imageFiles").files;
  let images = [];

  // 🔥 Image convert + resize
  if(files.length > 0){

  const imageArray = [];

for(let i=0;i<files.length;i++){

  const reader = new FileReader();

  await new Promise(resolve=>{

    reader.onload = function(e){

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const img = new Image();

      img.onload = function(){

        canvas.width = 600;
        canvas.height = 800;

        ctx.drawImage(img,0,0,600,800);

        const small =
          canvas.toDataURL("image/jpeg",0.9);

        imageArray[i] = small;

        resolve();
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(files[i]);

  });

}

images = imageArray;  
    }

    // 🔥 SEND
  if(!name || !price || sizeStock.length === 0 || images.length === 0){
    alert("Fill all fields ❗");
    return;
  }

  try{

    const url = window.editId
      ? BASE_URL + "/products/" + window.editId
      : BASE_URL + "/add-product";

    const method = window.editId ? "PUT" : "POST";

    const res = await fetch(url,{
      method: method,
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("adminToken")
      },
      body: JSON.stringify({
        name,
        styleNo: document.getElementById("styleNo").value,
        price,
        stock:0,
        type,
        category,
        sizes,
        sizeStock,
       primaryImage: images[0],
images,
        brand,
        fabric,
        typeDetail,
        fit,
        pattern,
        color,
        occasion,
        description
      })
    });

    const data = await res.json();

    if(res.ok){

  alert(
    window.editId
    ? "Product Updated ✅"
    : "Product Added ✅"
  );

  window.editId = null;

  // hide form
  document.getElementById("productSection")
    .style.display = "none";

  // show products
  document.getElementById("productsSection")
    .style.display = "block";

  // show add button
  document.getElementById("addBtnWrap")
    .style.display = "flex";

  // reload products
  loadProducts();

  // clear inputs
  document
    .querySelectorAll("input:not([type='file'])")
    .forEach(i => i.value = "");

  document.getElementById("imageFiles").value = "";

  document.getElementById("previewBox").innerHTML = "";

  loadSizeOptions();

}else{

  alert(data.message || "Error ❌");

}
 }   
    catch(err){

    console.log(err);
    alert("Server error ❌");

  }

}
  function exportExcel(){
  fetch(BASE_URL + "/products")
    .then(res => res.json())
    .then(data => {

      let csv = "Name,Price,Stock,Category,Type,Color\n";

      data.forEach(p => {
        csv += `${p.name},${p.price},${p.stock},${p.category},${p.type},${p.color}\n`;
      });

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "products.csv";
      a.click();
    });
}
  function importExcel(){

  const file = document.getElementById("excelFile").files[0];

  if(!file){
    alert("Select file ❗");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){

    const text = e.target.result;
    const rows = text.split("\n");

    for(let i=1; i<rows.length; i++){

      const cols = rows[i].split(",");

      if(cols.length < 3) continue;

      await fetch(BASE_URL + "/add-product", {
        method: "POST",
        headers: {
          "Content-Type":"application/json",
          "Authorization":"Bearer " + localStorage.getItem("adminToken")
        },
        body: JSON.stringify({
          name: cols[0],
          price: Number(cols[1]),
          stock: Number(cols[2]),
          category: cols[3] || "",
          type: cols[4] || "",
          color: cols[5] || "",
          images: []   // ⚠️ images must be added later
        })
      });

    }

    alert("Import Done ✅");
    loadProducts();
  };

  reader.readAsText(file);
}
  async function importZip(){

  const file = document.getElementById("zipFile").files[0];

  if(!file){
    alert("Select ZIP ❗");
    return;
  }

  const zip = await JSZip.loadAsync(file);

  let csvFile = null;

  // 🔍 Find CSV
  for(const filename in zip.files){
    if(filename.endsWith(".csv")){
      csvFile = zip.files[filename];
    }
  }

  if(!csvFile){
    alert("CSV not found ❌");
    return;
  }

  const csvText = await csvFile.async("text");
  const rows = csvText.split("\n");

  for(let i=1; i<rows.length; i++){

    const cols = rows[i].split(",");

    if(cols.length < 6) continue;

    const styleNo = cols[0]; // 🔥 MAIN KEY

    let images = [];

    // 🔥 AUTO MATCH IMAGES
    for(const filename in zip.files){

      if(filename.startsWith(styleNo)){

        const file = zip.files[filename];

        if(!file.dir){

          const base64 = await file.async("base64");

          images.push("data:image/jpeg;base64," + base64);
        }
      }
    }

    // 🚀 SEND TO BACKEND
    await fetch(BASE_URL + "/add-product", {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("adminToken")
      },
      body: JSON.stringify({
        styleNo,
        name: cols[1],
        price: Number(cols[2]),
        stock: Number(cols[3]),
        category: cols[4] || "",
        type: cols[5] || "",
        color: cols[6] || "",
        images
      })
    });

  }

  alert("ZIP Import Success ✅🔥");
  loadProducts();
}
  // 🔥 SEND DATA
  async function send(){

    if(!name || !price || sizeStock.length === 0 || images.length === 0){
      alert("Fill all fields ❗");
      return;
    }

    console.log("Token:", localStorage.getItem("adminToken"));

    try{

     const url = window.editId 
  ? BASE_URL + "/products/" + window.editId
  : BASE_URL + "/add-product";

const method = window.editId ? "PUT" : "POST";

const res = await fetch(url,{
  method: method,
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer " + localStorage.getItem("adminToken")
        },
        body: JSON.stringify({
          name,
          price,
          stock: 0,
          type,
          category,
          sizes,
          sizeStock,
          images: images.length > 0 ? images : undefined,
          brand,
          fabric,
          typeDetail,
          fit,
          pattern,
          color,
          occasion,
          description
        })
      });

     const data = await res.json();

if(res.ok){

  if(window.editId){
    alert("Product Updated ✅");
    window.editId = null;
  } else {
    alert("Product Added ✅");
  }

  loadProducts();

  document.querySelectorAll("input:not([type='file'])")
    .forEach(i => i.value = "");

  document.getElementById("imageFiles").value = "";
  document.getElementById("previewBox").innerHTML = "";

}else{
  alert("Error: " + (data.message || "Unauthorized ❌"));
}

    }catch(err){
      console.log(err);
      alert("Server error ❌");
    }
  }
/* BANNER UPLOAD */
async function uploadBanner(){

  const type = document.getElementById("bannerType").value;

  // VIDEO
  if(type === "video"){
    const file = document.getElementById("bannerVideoFile").files[0];

    if(!file){
      alert("Select video ❗");
      return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){
      await fetch(BASE_URL + "/banner",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          type:"video",
          videoUrl:e.target.result,
          images:[]
        })
      });

      alert("Video Updated ✅");
    };

    reader.readAsDataURL(file);
  }

  // SLIDER
  if(type === "slider"){
    const files = document.getElementById("bannerImages").files;

    if(files.length === 0){
      alert("Select images ❗");
      return;
    }

    let images = [];

    for(let i=0;i<files.length;i++){
      const reader = new FileReader();

      await new Promise(resolve=>{
        reader.onload = function(e){
          images.push(e.target.result);
          resolve();
        };
        reader.readAsDataURL(files[i]);
      });
    }

    await fetch(BASE_URL + "/banner",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        type:"slider",
        videoUrl:"",
        images
      })
    });

    alert("Slider Updated ✅");
  }
}

  // hide all
 document.getElementById("productWrapper").style.display = "none";

document.getElementById("ordersSection").style.display = "none";

document.getElementById("bannerSection").style.display = "none";

  // 🔥 PRODUCT

  document.getElementById("productWrapper")
    .style.display = "block";

  document.getElementById("productSection")
    .style.display = "none";

  document.getElementById("addBtnWrap")
    .style.display = "flex";

}

  if(section === "orders"){

/* DELETE */
function deleteProduct(id){

  if(!confirm("Delete?")) return;

  fetch(BASE_URL + "/products/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("adminToken")
    }
  })
  .then(res => res.json())
  .then(() => loadProducts());
}
function editProduct(id){

  fetch(BASE_URL + "/products")
    .then(res => res.json())
    .then(data => {

      const p = data.find(x => x._id === id);

      // 🔥 FORM OPEN
      document.getElementById("productSection")

  function deleteOrder(id){

  if(!confirm("Delete this order? ❗")) return;

  fetch(BASE_URL + "/orders/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("adminToken")
    }
  })
  .then(res => res.json())
  .then(() => {
    alert("Order Deleted ✅");
    loadOrders();
  })
  .catch(() => alert("Delete failed ❌"));
}
/* UPDATE STATUS */
function updateStatus(id,status){
  fetch(BASE_URL+"/orders/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+localStorage.getItem("adminToken")
    },
    body: JSON.stringify({status})
  })
  .then(()=>loadOrders());
}
