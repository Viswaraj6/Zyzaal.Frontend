<!DOCTYPE html>
<html>
<head>
<title>Wishlist ❤️</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  font-family: 'Segoe UI';
  margin: 0;
  padding: 0px;
  background: #d8f3f0;

   display: flex;            /* 🔥 add */
  flex-direction: column;   /* 🔥 add */
  min-height: 200vh;  
}
.header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

.menu-left{
  display: flex;
  gap: 15px;
  font-size: 14px;
    width: 100px;
}

.logo-center{
  font-size: 22px;
  font-weight: bold;
   text-align: center;
  flex: 1;
}
/* 🔥 LOGO TEXT */
.logo-text{
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2.5px;
  
}

/* 🔥 R flip */
.flip-r{
  display: inline-block;
  transform: scaleX(-1);
}

/* 🔥 LINE + 618 SAME ROW */
.logo-bottom{
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 0px;
 gap: 1px;
}

/* 🔥 LINE */
.line{
  flex: 1;
  height: 2px;
  background: black;
  margin: 0 8px;
  max-width: 35px;
}

/* 🔥 618 */
.num{
  font-size: 14px;
  letter-spacing: 3px;
}
.menu-right{
  display: flex;
  gap: 15px;
  align-items: center;
   width: 100px;
  justify-content: flex-end;
}

.icon{
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.icon i{
  font-size: 18px;
  color: #111;
  transition: 0.3s;
}

.icon:hover i{
  color: #ff3f6c;  /* 🔥 hover effect */
}
  .icon:hover .fa-heart{
  font-weight: 900;
}
.cart span{
  position: absolute;
  top: -6px;
  right: -8px;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 50%;
}
 .main-wrapper{
  width: 100%;
  max-width: 450px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;              /* ⭐ important */
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
     
body{
  padding-top: 0px; /* header space */
}
     h1 {
      text-align: center;
    }

h2{
  text-align:center;
   font-size:22px;
   margin:15px 0;
}

#wishlist{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.card{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
 padding:18px;
  border-radius:12px;
  margin-bottom:10px;
}

.left{
  display:flex;
  align-items:center;
  gap:18px; 
}

.left img{
  width:110px; 
  height:140px;
  object-fit:cover;
  border-radius:6px;
}

.details h3{
  font-size:18px;  
  margin:0;
   font-weight:600;
}

.details p{
  margin:4px 0;
  color:green;
  font-weight:bold;
   font-size:16px;
}

.remove{
  font-size:22px;
  color:#888;
  cursor:pointer;
}

.remove:hover{
  color:red;
}
button{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
  .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top: 30px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
    #footer {
  margin-top: auto;
}
</style>
</head>

<body>
 <div id="header" class="header">
  <div class="menu-left"></div>

  <!-- LOGO CENTER -->
  <div class="logo-center" onclick="goHome()" style="cursor:pointer;">
    <div class="logo-text">
      FA<span class="flip-r">R</span>K
    </div>

    <div class="logo-bottom">
      <div class="line"></div>
      <span class="num">618</span>
      <div class="line"></div>
    </div>
  </div>

  <!-- RIGHT ICONS -->
  <div class="menu-right">

    <div class="icon" onclick="goPage('wishlist.html')">
      <i class="fa-regular fa-heart"></i>
    </div>

    <div class="icon" onclick="goPage('account.html')">
      <i class="fa-regular fa-user"></i>
    </div>

    <div class="icon cart" onclick="goPage('cart.html')">
      <i class="fa-solid fa-bag-shopping"></i>
      <span id="cartCount">0</span>
    </div>

  </div>
    </div>

<h2>❤️ My Wishlist (<span id="count">0</span>)</h2>

<div id="wishlist"></div>
<div id="footer"></div>
  
<script>
function goPage(page){
  window.location.href = page;
}
  
function goHome(){
  window.location.href = "index.html"; // 🔥 add this
}
function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function loadWishlist(){

  let fav = getFav();
  let html = "";

  document.getElementById("count").innerText = fav.length;

  if(fav.length === 0){
    html = "<p>No items in wishlist</p>";
  } else {

    fav.forEach(p => {
      html += `
        <div class="card">
          <div class="left">
            <img src="${p.images?.[0] || p.image}">
            <div class="details">
              <h3>${p.name}</h3>
              <p>₹${p.price}</p>
            </div>
          </div>

          <div class="remove" onclick="removeItem('${p._id || p.id}')">
            <i class="fa-solid fa-trash"></i>
          </div>
        </div>
      `;
    });

  }

  document.getElementById("wishlist").innerHTML = html;
}
function removeItem(id){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav = fav.filter(p => (p._id || p.id) != id);

  localStorage.setItem("fav", JSON.stringify(fav));

  loadWishlist();
}
// ✅ INIT
loadWishlist();

// ✅ footer load
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });

</script>
</body>
</html>
