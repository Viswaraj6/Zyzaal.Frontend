<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Comfortaa',sans-serif;
    margin:0;
    background:#d8f3f0;
    padding-top:95px;
    overflow-x:hidden;

    display:flex;
    flex-direction:column;
    min-height:100vh;
}
button,
input,
textarea,
select,
h1,h2,h3,h4,h5,h6,
p,
span,
div{
    font-family:'Comfortaa',sans-serif;
}
.top-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:99999;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}
    #header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:99999;
}
     .icon{
  font-size: 18px;
  cursor: pointer;
  position: relative;
}
.icon i{
  font-size: 18px;
  color: #111;
  transition: 0.3s;
}

.icon:hover i{
  color: #ff3f6c;  /* 🔥 hover effect */
}
  .icon:hover .fa-heart{
  font-weight: 900;
}
 .main-wrapper{
  width: 100%;
  max-width: 450px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;              /* ⭐ important */
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
     

     h1 {
      text-align: center;
    }

h2{
  text-align:center;
   font-size:22px;
   margin:15px 0;
}

#wishlist{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:10px;
    flex:1;
}

.card{
    display:flex;
    align-items:center;
    gap:12px;
    background:#fff;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    cursor:pointer;
}
.card:hover{
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
  transform:scale(1.01);
}
.left{
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
}
.left img{
    width:90px;
    height:110px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
}
.details{
    flex:1;
}

.details h3{
    font-size:15px;
    margin:0 0 6px;
    line-height:1.4;
    font-weight:600;
}

.details p{
    margin:0;
    color:green;
    font-size:16px;
    font-weight:bold;
}

.remove{
    width:36px;
    height:36px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    background:#f5f5f5;
    color:#666;
    font-size:18px;
    cursor:pointer;
}
.remove:hover{
    background:#ffe5e5;
    color:red;
}
button{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
  .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top:0px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
    #footer {
  margin-top: auto;
}
     .product-name{
    font-size:17px;
    font-weight:700;
    margin:0 0 8px;
    color:#222;
}

.price{
    color:#0b8f2a;
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.wishlist-actions{
    display:flex;
    justify-content:flex-end;
    margin-top:10px;
}


.cart-btn{
    flex:none;
    width:150px;
    background:#A8DDD0;
    color:#000;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
.cart-btn:hover{
    background:#8FD1C1;
}

.delete-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:#f5f5f5;
    color:#666;
    cursor:pointer;
    transition:.3s;
}

.delete-btn:hover{
    background:#ffe5e5;
    color:red;
}
 @media(max-width:768px){

body{
    margin:0;
    padding:75px 0 0;
    background:#d8f3f0;
    overflow-x:hidden;
}
h2{
    font-size:18px;
    margin:12px 0 15px;
    padding:0 12px;
    text-align:center;
}

#wishlist{
    width:100%;
    box-sizing:border-box;
    padding:0 10px 15px;
      flex:1;
}
#footer{
    margin-top:auto;
}
.card{
    width:100%;
    box-sizing:border-box;
    margin-bottom:12px;
    border-radius:10px;
}


.left img{
    width:85px;
    height:105px;
}

.details h3{
    font-size:14px;
}

.details p{
    font-size:15px;
}

}
</style>
</head>

<body>
<div id="header"></div>
<h2> My Wishlist (<span id="count">0</span>)</h2>

<div id="wishlist"></div>
<div id="footer"></div>
  
<script>
  function updateCartCount(){

    const cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    const el = document.getElementById("cartCount");

    if(el){
        el.innerText = cart.length;
    }

}
function goPage(page){
  window.location.href = page;
}
  
function goHome(){
  window.location.href = "index.html"; // 🔥 add this
}
async function getWishlist(){

    const phone = localStorage.getItem("user");

    if(!phone){
        return [];
    }

    const res = await fetch(API + "/wishlist/" + phone);

    return await res.json();

}
async function loadWishlist(){

    const fav = await getWishlist();

    let html = "";

    document.getElementById("count").innerText = fav.length;

    if(fav.length === 0){

        html = `
            <div style="text-align:center;padding:40px;">
                <h3>Your wishlist is empty</h3>
            </div>
        `;

    }else{

        fav.forEach(p=>{

            html += `
            <div class="card" onclick="openProduct('${p._id}')">

                <div class="left">

                    <img src="${p.primaryImage || p.images?.[0] || p.image}">

                    <div class="details">

                        <h3 class="product-name">
                            ${(p.category || p.name || "Product")
                            .toLowerCase()
                            .replace(/\b\w/g,c=>c.toUpperCase())}
                        </h3>

                        <div class="price">
                            ₹${p.price}
                        </div>

                        <div class="wishlist-actions">

                            <button
                                class="delete-btn"
                                onclick="event.stopPropagation();removeItem('${p._id}')">

                                <i class="fa-solid fa-trash"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </div>
            `;

        });

    }

    document.getElementById("wishlist").innerHTML = html;

}
     fetch("header.html")
.then(res => res.text())
.then(data => {

    document.getElementById("header").innerHTML = data;

    document.body.style.paddingTop =
        document.getElementById("header").offsetHeight + "px";

    const backBtn = document.getElementById("backBtn");

    if(backBtn){
        backBtn.onclick = () => history.back();
    }

    updateCartCount();
});
function removeItem(id){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav = fav.filter(p => (p._id || p.id) != id);

  localStorage.setItem("fav", JSON.stringify(fav));

  loadWishlist();
}
  const API = "https://fark618-backend.onrender.com";
     
function openProduct(id){

    // Recent Viewed save
    let recent = JSON.parse(localStorage.getItem("recentViewed")) || [];

    recent = recent.filter(x => x._id !== id);

    recent.unshift({_id:id});

    recent = recent.slice(0,6);

    localStorage.setItem("recentViewed", JSON.stringify(recent));

    // Product page open
    window.location.href = "product.html?id=" + id;

}
     // ✅ INIT
loadWishlist();

// ✅ footer load
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });

</script>
</body>
</html>
