<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
    font-family:'Comfortaa',sans-serif;
    margin:0;
    background:#d8f3f0;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-top:95px;
}
.top-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:99999;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}
    #header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:99999;
}
 .main-wrapper{
  width: 100%;
  max-width: 450px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;              /* ⭐ important */
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
     

     h1 {
      text-align: center;
    }

h2{
  text-align:center;
   font-size:22px;
   margin:15px 0;
}

#wishlist{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.card{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
 padding:18px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer; 
}
.card:hover{
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
  transform:scale(1.01);
}
.left{
  display:flex;
  align-items:center;
  gap:18px; 
}

.left img{
  width:100%; 
  height:180px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

.details h3{
  font-size:18px;  
  margin:0;
   font-weight:600;
}

.details p{
  margin:4px 0;
  color:green;
  font-weight:bold;
   font-size:16px;
}

.remove{
  font-size:22px;
  color:#888;
  cursor:pointer;
}

.remove:hover{
  color:red;
}
button{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
  .footer {
  background: #111;
  color: #fff;
  padding: 30px 15px 10px;
  margin-top: 30px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
}

.footer-col h4 {
  margin-bottom: 10px;
  font-size: 14px;
}

.footer-col a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
  font-size: 13px;
}

.footer-col a:hover {
  color: #fff;
}

.footer-col p {
  font-size: 13px;
  color: #bbb;
}

.footer-bottom {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}
    #footer {
  margin-top: auto;
}
   @media (max-width:768px){

body{
    padding-top:75px;
}

h2{
    font-size:20px;
    margin:12px 0;
}

#wishlist{
    padding:8px;
    gap:8px;
}

.card{
    padding:10px;
    border-radius:10px;
}

.left{
    gap:12px;
    align-items:flex-start;
    flex:1;
}

.left img{
    width:85px;
    height:105px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
}

.details{
    flex:1;
    min-width:0;
}

.details h3{
    font-size:15px;
    margin-bottom:6px;
    line-height:1.4;
}

.details p{
    font-size:15px;
    margin:3px 0;
}

.remove{
    font-size:20px;
    margin-left:10px;
    align-self:center;
}

} 
</style>
</head>

<body>
<div id="header"></div>
<h2> My Wishlist (<span id="count">0</span>)</h2>

<div id="wishlist"></div>
<div id="footer"></div>
  
<script>
  function updateCartCount(){

    const cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    const el = document.getElementById("cartCount");

    if(el){
        el.innerText = cart.length;
    }

}
function goPage(page){
  window.location.href = page;
}
  
function goHome(){
  window.location.href = "index.html"; // 🔥 add this
}
function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function loadWishlist(){

  let fav = getFav();
  let html = "";

  document.getElementById("count").innerText = fav.length;

  if(fav.length === 0){
    html = "<p>No items in wishlist</p>";
  } else {

    fav.forEach(p => {
      html += `
       <div class="card" onclick="openProduct('${p._id || p.id}')">
          <div class="left">
            <img src="${p.images?.[0] || p.image}">
            <div class="details">
              <h3>${p.name}</h3>
              <p>₹${p.price}</p>
            </div>
          </div>

          <div class="remove" onclick="event.stopPropagation(); removeItem('${p._id || p.id}')">
            <i class="fa-solid fa-trash"></i>
          </div>
        </div>
      `;
    });

  }

  document.getElementById("wishlist").innerHTML = html;
}
  fetch("header.html")
.then(res => res.text())
.then(data => {

    document.getElementById("header").innerHTML = data;

    document.body.style.paddingTop =
        document.getElementById("header").offsetHeight + "px";

    const backBtn = document.getElementById("backBtn");

    if(backBtn){
        backBtn.onclick = () => history.back();
    }

    updateCartCount();
});
function removeItem(id){

  let fav = JSON.parse(localStorage.getItem("fav")) || [];

  fav = fav.filter(p => (p._id || p.id) != id);

  localStorage.setItem("fav", JSON.stringify(fav));

  loadWishlist();
}
  const API = "https://fark618-backend.onrender.com";

function openProduct(id){

  fetch(API + "/products")
    .then(res => res.json())
    .then(data => {

      const product = data.find(p => p._id == id);

      localStorage.setItem("selectedProduct", JSON.stringify(product));

      window.location.href = "product.html";
    });

}
// ✅ INIT
loadWishlist();

// ✅ footer load
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });

</script>
</body>
</html>
