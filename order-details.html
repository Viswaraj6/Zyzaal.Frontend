<!DOCTYPE html>
<html>
<head>
<title>Order Details</title>

<style>

body{
  font-family:Segoe UI;
  margin:0;
  background:#f1f3f6;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.box{
  background:#fff;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.product{
  display:flex;
  gap:20px;
}

.product img{
  width:140px;
  height:170px;
  object-fit:cover;
  border-radius:10px;
}

.green{
  color:green;
  font-weight:bold;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.invoice-btn{
  background:black;
  color:white;
}
.invoice-btn{
  background:black;
  color:white;
}

.download-btn{
  background:#2874f0;
  color:white;
}
.download-btn{
  background:#2874f0;
  color:white;
}

</style>
</head>

<body>

<div class="container">

  <div class="box" id="productBox"></div>

  <div class="box" id="deliveryBox"></div>

  <div class="box" id="priceBox"></div>

  <div class="box">

    <button
    class="invoice-btn"
    onclick="viewInvoice()">
      View Invoice
    </button>

    <button
    class="download-btn"
    onclick="downloadInvoice()">
      Download Invoice
    </button>

  </div>

</div>

<script>

const order =
  JSON.parse(
    localStorage.getItem("selectedOrder")
  );

console.log(order);

const item =
  order.products?.[0] ||
  order.items?.[0] ||
  order.product ||
  {};

document.getElementById("productBox")
.innerHTML = `

<div class="product">

<img src="
${item.primaryImage || item.image || item.images?.[0] || 'https://dummyimage.com/300x400/e5e5e5/000&text=No+Image'}
">

<div>

<h2>
${
item.name ||
item.productName ||
"Product"
}
</h2>

<div class="green">
${order.status || "Pending"}
</div>

<p>
₹${item.price || order.total || 0}
</p>

<p>
Order ID:
${order._id?.slice(-6) || ""}
</p>

<div style="
margin-top:30px;
padding-top:20px;
border-top:1px solid #eee;
">

<div style="
display:flex;
align-items:center;
gap:15px;
margin-bottom:22px;
">

<div style="
width:18px;
height:18px;
background:green;
border-radius:50%;
"></div>

<div>

<div style="
font-weight:600;
">
Order Confirmed
</div>

<div style="
font-size:14px;
color:#666;
">
${new Date(
order.orderDate || Date.now()
).toLocaleDateString("en-IN",{
day:"numeric",
month:"short"
})}
</div>

</div>

</div>

<div style="
display:flex;
align-items:center;
gap:15px;
">

<div style="
width:18px;
height:18px;
background:#90EE90;
border-radius:50%;
"></div>

<div>

<div style="
font-weight:600;
">
Expected Delivery
</div>

<div style="
font-size:14px;
color:#666;
">
${new Date(
Date.now() + 4*24*60*60*1000
).toLocaleDateString("en-IN",{
weekday:"short",
day:"numeric",
month:"short"
})}
</div>

</div>

</div>

<div style="
margin-top:25px;
color:#2874f0;
font-weight:600;
cursor:pointer;
font-size:15px;
">
See all updates >
</div>

</div>

</div>

</div>

`;
document.getElementById("deliveryBox")
.innerHTML = `

<h2 style="
margin-bottom:20px;
">
Delivery Address
</h2>

<div style="
background:#fff;
border:1px solid #ddd;
padding:18px;
border-radius:12px;
line-height:30px;
font-size:16px;
position:relative;
">

<div style="
position:absolute;
top:18px;
right:18px;
color:#2874f0;
font-weight:600;
font-size:14px;
cursor:pointer;
">
Home
</div>

<b style="
font-size:18px;
">
${order.name || ""}
</b>

<span style="
margin-left:10px;
color:#555;
">
${order.phone || ""}
</span>

<br><br>

${order.address || ""}

</div>

`;
  document.getElementById("priceBox")
.innerHTML = `

<h2>Price Details</h2>

<p>
Total Price:
₹${order.total || item.price || 0}
</p>

<p>
Payment:
${order.paymentMethod || "Online"}
</p>

`;

function viewInvoice(){

  window.open(
    order.invoice ||
    "invoice.pdf",
    "_blank"
  );

}

function downloadInvoice(){

  const a =
    document.createElement("a");

  a.href =
    order.invoice ||
    "invoice.pdf";

  a.download =
    "invoice.pdf";

  a.click();

}

</script>
</body>
</html>
