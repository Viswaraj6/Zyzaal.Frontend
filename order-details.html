<!DOCTYPE html>
<html>
<head>
<title>Order Details</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  font-family:Segoe UI;
  margin:0;
  background:#f1f3f6;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  margin-top:20px;
}

.box{
  background:#fff;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.product{
  display:flex;
  gap:20px;
}

.product img{
  width:140px;
  height:170px;
  object-fit:cover;
  border-radius:10px;
}

.green{
  color:green;
  font-weight:bold;
}
.invoice-btn,
.download-btn{

background:#90EE90;
color:#000;
border:1px solid #000;

}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>
<div id="header"></div>
  
<div class="container">

  <div class="box" id="productBox"></div>

  <div class="box" id="deliveryBox"></div>

  <div class="box" id="priceBox"></div>

  <div class="box">

    <button
    class="invoice-btn"
    onclick="viewInvoice()">
      View Invoice
    </button>

    <button
    class="download-btn"
    onclick="downloadInvoice()">
      Download Invoice
    </button>

  </div>

</div>

<script>

const order =
  JSON.parse(
    localStorage.getItem("selectedOrder")
  );

console.log(order);

const items =
  order.products ||
  order.items ||
  [order.product];

const statusSteps = [
  "Pending",
  "Processing",
  "Shipped",
  "Delivered"
];

const currentStep =
statusSteps.indexOf(order.status);

const orderDate =
new Date(
order.orderDate || Date.now()
).toLocaleDateString("en-IN",{
day:"numeric",
month:"short"
});

const expectedDate = new Date(
  order.orderDate || order.createdAt
);

expectedDate.setDate(
  expectedDate.getDate() + 4
);

const deliveryDate =
order.status === "Delivered"
? new Date(order.deliveryDate)
    .toLocaleDateString("en-IN",{
      day:"numeric",
      month:"short",
      year:"numeric"
    })
: expectedDate.toLocaleDateString("en-IN",{
      day:"numeric",
      month:"short",
      year:"numeric"
    });
  
let productHTML = "";

items.forEach(item => {

productHTML += `

<div class="product" style="margin-bottom:25px;">

<img src="
${item.primaryImage || item.image || item.images?.[0]}
">

<div>

<h2>
${item.styleNo || item.name}
</h2>

<div class="green">
${order.status}
</div>

<p>
₹${item.price}
</p>

<p>
Size: ${item.size || "-"}
</p>

<p>
Qty: ${item.qty || 1}
</p>

</div>

`;

});

document.getElementById("productBox").innerHTML = `

${productHTML}
<div style="margin-top:25px;">

<button
onclick="openUpdates()"
style="
background:none;
border:none;
color:#2874f0;
font-size:16px;
cursor:pointer;
padding:0;
font-weight:600;
">
See all updates >
</button>

</div>

<div style="
margin-top:30px;
padding-top:20px;
border-top:1px solid #eee;
">

<div style="
display:flex;
align-items:center;
gap:15px;
margin-bottom:22px;
">

<div style="
width:18px;
height:18px;
background:green;
border-radius:50%;
"></div>

<div>

<div style="font-weight:600;">
Order Confirmed
</div>

<div style="
font-size:14px;
color:#666;
">
${orderDate}
</div>

</div>

</div>

<div style="
display:flex;
align-items:center;
gap:15px;
">

<div style="
width:18px;
height:18px;
background:
${order.status === "Delivered"
? "green"
: "#90EE90"};
border-radius:50%;
"></div>

<div>

<div style="font-weight:600;">
${order.status === "Delivered"
? "Delivered"
: "Expected Delivery"}
</div>

<div style="
font-size:14px;
color:#666;
">
${deliveryDate}
</div>

</div>

</div>

</div>
`;
  document.getElementById("deliveryBox")
.innerHTML = `

<h2 style="
margin-bottom:20px;
">
Delivery Address
</h2>

<div style="
background:#fff;
border:1px solid #ddd;
padding:18px;
border-radius:12px;
line-height:30px;
font-size:16px;
position:relative;
">

<div style="
position:absolute;
top:18px;
right:18px;
color:#2874f0;
font-weight:600;
font-size:14px;
cursor:pointer;
">
Home
</div>

<b style="
font-size:18px;
">
${order.name || ""}
</b>

<span style="
margin-left:10px;
color:#555;
">
${order.phone || ""}
</span>

<br><br>

${order.address || ""}

</div>

`;
  document.getElementById("priceBox")
.innerHTML = `

<h2>Price Details</h2>

<p>
Total Price:
₹${order.total || item.price || 0}
</p>

<p>
Payment:
${order.paymentMethod || "Online"}
</p>

`;

function viewInvoice(){

const invoiceWindow = window.open("", "_blank");

invoiceWindow.document.write(`

<html>

<head>

<title>Invoice</title>

<style>

body{
font-family:Arial;
padding:40px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:12px;
text-align:left;
}

.total{
text-align:right;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Tax Invoice</h1>

<div class="top">

<div>

<h3>Sold By</h3>

<p>

</p>

<p>
Tamil Nadu, India
</p>

</div>

<div>

<p>
Order ID:
#${order.orderNumber || "00000"}
</p>

<p>
Order Date:
${orderDate}
</p>

<p>
Delivery Date:
${deliveryDate}
</p>

</div>

</div>

<h3>Billing Address</h3>

<p>
${order.name}
</p>

<p>
${order.phone}
</p>

<p>
${order.address}
</p>

<table>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

</tr>

${items.map(item => `

<tr>

<td>
${item.styleNo || item.name}
</td>

<td>
${item.qty || 1}
</td>

<td>
₹${item.price}
</td>

<td>
₹${item.price * (item.qty || 1)}
</td>

</tr>

`).join("")}
</table>

<div class="total">

Grand Total:
₹${order.total}

</div>

<br><br>

<p>
Payment Method:
${order.paymentMethod || "Online"}
</p>

</body>

</html>

`);

invoiceWindow.document.close();

}

function downloadInvoice(){

invoiceWindow.document.write(`

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:12px;
text-align:left;
}

.total{
text-align:right;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Tax Invoice</h1>

<div class="top">

<div>

<h3>Sold By</h3>

</div>

</p>

<p>

</p>

<h3>Billing Address</h3>

<p>${order.name}</p>

<p>${order.phone}</p>

function openUpdates(){

document.getElementById(
"updatesModal"
).style.display = "flex";

}

function closeUpdates(){

document.getElementById(
"updatesModal"
).style.display = "none";

}
  document.body.innerHTML += `

<div id="updatesModal" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:#fff;
width:420px;
max-height:80vh;
overflow:auto;
border-radius:12px;
padding:25px;
position:relative;
">

<div onclick="closeUpdates()" style="
position:absolute;
right:20px;
top:15px;
font-size:32px;
cursor:pointer;
">
×
</div>

<div style="
position:relative;
padding-left:25px;
margin-top:20px;
">

<div style="
position:absolute;
left:0;
top:0;
width:3px;

height:
${currentStep === 0
? "80px"
: currentStep === 1
? "195px"
: currentStep === 2
? "315px"
: "100%"};

background:#16a34a;
"></div>
${statusSteps.map((step,index)=>`

<div style="
margin-bottom:35px;
position:relative;
opacity:
${index <= currentStep ? "1" : "0.45"};
">

<div style="
width:14px;
height:14px;
background:
${index <= currentStep
? "#16a34a"
: "#d1d5db"};
border-radius:50%;
position:absolute;
left:-31px;
top:3px;
"></div>

<h3 style="
margin:0;
font-size:18px;
">

${step === "Pending"
? "Order Confirmed"
: step}

</h3>

<p style="
color:#777;
margin:5px 0;
font-size:14px;
">

${index === 0
? orderDate
: index === 3
? deliveryDate
: "Processing update"}

</p>

<p style="
margin-top:10px;
font-size:15px;
">

${step === "Pending"
? "Your order has been placed."
: step === "Processing"
? "Seller has processed your order."
: step === "Shipped"
? "Your item has been shipped."
: "Your item has been delivered."}

</p>

</div>

`).join("")}

</div>

</div>

</div>

`;

function goPage(page){
  location.href = page;
}

function updateCartCount(){
  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  document.getElementById("cartCount").innerText =
    cart.length;
}
fetch("header.html")
.then(res => res.text())
.then(data => {

    document.getElementById("header").innerHTML = data;

    document.body.style.paddingTop =
        document.getElementById("header").offsetHeight + "px";

    updateCartCount();

    const backBtn = document.getElementById("backBtn");

    if(backBtn){
        backBtn.onclick = () => history.back();
    }

});
updateCartCount();
  
</script>

</body>
</html>
