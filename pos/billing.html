<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Zyzaal POS</title>

<link rel="stylesheet" href="css/billing.css">

</head>

<body>

<header class="header">

    <div class="left">

        ☰

        <span class="logo">ZYZAAL</span>

        <span class="pos">POS</span>

    </div>

    <div class="center">

        Store : RS Puram ▼

    </div>

    <div class="right">

        Sync

        🔔

        <div class="avatar">VM</div>

    </div>

</header>

<main class="container">

    <div class="top-bar">
        <div class="search-box">

            <input
                type="text"
                placeholder="Scan Barcode / Search Product">

        </div>

        <button class="customer-btn">

            + Customer

        </button>

    </div>
    
<div class="billing-layout">
   <div class="left-panel">

    <div class="cart-header">

        <div>#</div>

        <div>Product</div>

        <div>Size</div>

        <div>Qty</div>

        <div>Rate</div>

        <div>Amount</div>

    </div>

    <div class="cart-body">

    <div class="cart-item">

        <div>1</div>

        <div>

            <strong>Smart Shirt</strong><br>

            <small>SS-SKY-M</small>

        </div>

        <div>M</div>

        <div>1</div>

        <div>₹999</div>

        <div>₹999</div>

    </div>

</div>
  <div class="cart-summary">

    <div class="summary-top">

        <span>Items : 1</span>

        <button class="clear-btn">Clear All</button>

    </div>

    <div class="summary-row">
        <span>Total Qty</span>
        <span>1</span>
    </div>

    <div class="summary-row">
        <span>Sub Total</span>
        <span>₹999</span>
    </div>

    <div class="summary-row">
        <span>Discount</span>
        <span>₹0</span>
    </div>

    <div class="summary-row">
        <span>Round Off</span>
        <span>₹0</span>
    </div>

    <div class="grand-total">

        <span>Grand Total</span>

        <span>₹999</span>

    </div>

</div>      
</div>
   
   <div class="center-panel">

    <div class="category-tabs">

        <button class="active">All</button>

        <button>Shirt</button>

        <button>Pant</button>

        <button>T-Shirt</button>

        <button>Jeans</button>

    </div>

    <div class="product-grid">

    <div class="product-card">

        <img src="../images/shirt1.png" alt="">

        <h4>Smart Shirt</h4>

        <p>₹999</p>

    </div>

    <div class="product-card">

        <img src="../images/pant1.png" alt="">

        <h4>Linen Pant</h4>

        <p>₹1299</p>

    </div>

</div>

</div>
    <div class="right-panel">

    <div class="payment-box">

        <div class="grand-total-box">

            <small>Grand Total</small>

            <h1>₹999</h1>

        </div>

        <button class="pay-btn">💵 Cash</button>

        <button class="pay-btn">💳 Card</button>

        <button class="pay-btn">📱 UPI</button>

        <button class="pay-btn">👛 Wallet</button>

        <button class="pay-btn">🔀 Split Payment</button>

        <button class="save-btn">

            Save & Print (F9)

        </button>

    </div>

</div>
</div>
    
</main>

<script src="js/billing.js"></script>

</body>

</html>
