<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Zyzaal POS</title>

<link rel="stylesheet" href="css/billing.css">

</head>

<body>

<header class="header">

    <div class="left">

        ☰

        <span class="logo">ZYZAAL</span>

        <span class="pos">POS</span>

    </div>

    <div class="center">

        Store : RS Puram ▼

    </div>

    <div class="right">

        Sync

        🔔

        <div class="avatar">VM</div>

    </div>

</header>

<main class="container">

    <div class="top-bar">
        <div class="search-box">

           <input
    type="text"
    id="barcodeInput"
    placeholder="Scan Barcode / Search Product">

        </div>

        <button class="customer-btn">

            + Customer

        </button>

    </div>
    
<div class="billing-layout">
   <div class="left-panel">

    <div class="cart-header">

        <div>#</div>

        <div>Product</div>

        <div>Size</div>

        <div>Qty</div>

        <div>Rate</div>

        <div>Amount</div>
        <div>Action</div>
    </div>

   <div class="cart-body">

</div>
  <div class="cart-summary">

    <div class="summary-top">

      <span>Items : <span id="itemCount">0</span></span>

        <button class="clear-btn">Clear All</button>

    </div>

   <div class="summary-row">
    <span>Total Qty</span>
    <span id="totalQty">0</span>
</div>

    <div class="summary-row">
        <span>Sub Total</span>
        <span>₹999</span>
    </div>

    <div class="summary-row">
        <span>Discount</span>
        <span>₹0</span>
    </div>

    <div class="summary-row">
        <span>Round Off</span>
        <span>₹0</span>
    </div>

   <div class="grand-total">

    <span>Grand Total</span>

    <span>₹<span id="grandTotal">0</span></span>

</div>

</div>      
</div>
<!--   
 <div class="center-panel">

    <div class="category-tabs">

        <button class="active">All</button>

        <button>Shirt</button>

        <button>Pant</button>

        <button>T-Shirt</button>

        <button>Jeans</button>

    </div>

  <div class="product-grid hidden" id="productGrid"></div>

<div class="pagination hidden" id="pagination"></div>
</div>
-->
    <div class="right-panel">

    <div class="payment-box">

        <div class="grand-total-box">

            <small>Grand Total</small>

            <h1>₹<span id="paymentGrandTotal">0</span></h1>

        </div>

        <button class="pay-btn">💵 Cash</button>

        <button class="pay-btn">💳 Card</button>

        <button class="pay-btn">📱 UPI</button>

        <button class="pay-btn">👛 Wallet</button>

        <button class="pay-btn">🔀 Split Payment</button>

        <button class="save-btn">

            Save & Print (F9)

        </button>

    </div>

</div>
</div>
  <!-- Search Popup -->

<div class="search-popup hidden" id="searchPopup">

    <div class="popup-box">

        <div class="popup-header">

            <h3>Search Products</h3>

            <button onclick="closeSearch()">✕</button>

        </div>

        <div class="popup-results" id="popupResults">

        </div>

    </div>

</div> 

    <!-- Size Popup -->

<div class="size-popup hidden" id="sizePopup">

    <div class="size-box">

        <div class="popup-header">

            <h3 id="sizeTitle">Choose Size</h3>

            <button onclick="closeSize()">✕</button>

        </div>

        <div class="size-list" id="sizeList">

        </div>

    </div>

</div>
</main>

<script src="js/billing.js"></script>

</body>

</html>
