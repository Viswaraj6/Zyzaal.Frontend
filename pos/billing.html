<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Zyzaal POS</title>

<link rel="stylesheet" href="css/billing.css">

</head>

<body>

<header class="header">

    <div class="left">

        ☰

        <span class="logo">ZYZAAL</span>

        <span class="pos">POS</span>

    </div>

    <div class="center">

        Store : RS Puram ▼

    </div>

    <div class="right">

        Sync

        🔔

        <div class="avatar">VM</div>

    </div>

</header>

<main class="container">

    <div class="top-bar">
        <div class="search-box">

            <input
                type="text"
                placeholder="Scan Barcode / Search Product">

        </div>

        <button class="customer-btn">

            + Customer

        </button>

    </div>
    
<div class="billing-layout">

   <div class="left-panel">

    <div class="cart-header">

        <div>#</div>

        <div>Product</div>

        <div>Size</div>

        <div>Qty</div>

        <div>Rate</div>

        <div>Amount</div>

    </div>

    <div class="cart-body">

    </div>

</div>
    
    <div class="center-panel">

    </div>

    <div class="right-panel">

    </div>

</div>
    
</main>

<script src="js/billing.js"></script>

</body>

</html>
