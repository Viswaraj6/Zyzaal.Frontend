<script>
async function loadProduct(){

  const res = await fetch(API + "/products");

  const data = await res.json();

  product =
    data.find(p => p._id === productId);

  if(!product){
    alert("Product not found");
    return;
  }

  startProduct();
   document.getElementById("productLoader").style.display = "none";

}
const API = "https://fark618-backend.onrender.com";

const params = new URLSearchParams(window.location.search);

const productId = params.get("id");

let product = {};
// PRODUCT START
let images = [];
let currentIndex = 0;
let selectedSize = "";

function startProduct(){

  // NAME
  document.getElementById("name").innerText =
    product.name;

  // PRICE
  document.getElementById("price").innerText =
    "₹" + product.price;

  // DETAILS
  document.getElementById("specs").innerHTML = `
    <ul style="padding-left:15px;">
      <li><b>Brand:</b> ${product.brand || "-"}</li>
      <li><b>Fabric:</b> ${product.fabric || "-"}</li>
      <li><b>Type:</b> ${product.typeDetail || "-"}</li>
      <li><b>Fit:</b> ${product.fit || "-"}</li>
      <li><b>Pattern:</b> ${product.pattern || "-"}</li>
      <li><b>Color:</b> ${product.color || "-"}</li>
      <li><b>Occasion:</b> ${product.occasion || "-"}</li>
    </ul>

    <p style="margin-top:10px;">
      <b>Description:</b>
      ${product.description || "-"}
    </p>
  `;

  // IMAGES
  if(product.images && product.images.length > 0){
    images = product.images;
  }
  else if(product.image){
    images = [product.image];
  }
  else{
    images = ["https://via.placeholder.com/300"];
  }

  const primary =
    product.primaryImage || images[0];

  currentIndex =
    images.indexOf(primary);

  if(currentIndex < 0){
    currentIndex = 0;
  }

  updateImage();

  // THUMBS
  let thumbsHTML = "";

  images.forEach((img)=>{

    thumbsHTML += `
      <img
        src="${img}"
        onclick="changeImage('${img}')"
        class="${
          img === primary
          ? "active"
          : ""
        }"
      >
    `;

  });

  document.getElementById("thumbs").innerHTML =
    thumbsHTML;

  // SIZE
  let sizeHTML = "";

  (product.sizeStock || []).forEach(s=>{

    sizeHTML += `

      <div
        class="size"

        onclick="${
          s.stock <= 0
          ? ""
          : `selectSize(this,'${s.size}')`
        }"

        style="
          ${
            s.stock <= 0
            ? `
            opacity:.5;
            cursor:not-allowed;
            `
            : ""
          }
        "
      >

        ${s.size}

      </div>

    `;

  });

  document.getElementById("sizes").innerHTML =
    sizeHTML;

  const first =
    document.querySelector(".size");

  if(first){

    first.classList.add("active");

    selectedSize =
      first.innerText.trim();

  }

  // STICKY
  document.getElementById("stickyImg").src =
    product.primaryImage ||
    product.images?.[0] ||
    product.image;

  document.getElementById("stickyName").innerText =
    product.name;

  document.getElementById("stickyPrice").innerText =
    "₹" + product.price;

  // STICKY SIZE
  let sizeDrop = "";

  (product.sizeStock || []).forEach(s=>{

    sizeDrop += `
      <option
        ${s.stock <= 0 ? "disabled" : ""}
      >
        ${s.size}
      </option>
    `;

  });

  document.getElementById("stickySize").innerHTML =
    sizeDrop;

  document.getElementById("stickySize")
  .addEventListener("change", function(){

    selectedSize = this.value;

    checkCartStatus();

  });

  loadSimilar();

  checkCartStatus();

  initDelivery();
  // loader hide
  document.getElementById("productLoader").style.display = "none";

}

// IMAGE CHANGE
function changeImage(src){

  currentIndex = images.indexOf(src);

  updateImage();

}

// NEXT
function nextImage(){

  currentIndex++;

  if(currentIndex >= images.length){
    currentIndex = 0;
  }

  updateImage();

}

// PREV
function prevImage(){

  currentIndex--;

  if(currentIndex < 0){
    currentIndex = images.length - 1;
  }

  updateImage();

}

// UPDATE
function updateImage(){

  document.getElementById("mainImage").src =
    images[currentIndex];

  document.querySelectorAll(".thumbs img")
    .forEach(x => x.classList.remove("active"));

  const active =
    document.querySelectorAll(".thumbs img")[currentIndex];

  if(active){
    active.classList.add("active");
  }

}
  function selectSize(el,size){

  document
    .querySelectorAll(".size")
    .forEach(x => x.classList.remove("active"));

  el.classList.add("active");

  selectedSize = size;

  checkCartStatus();

}
// scroll show/hide
window.addEventListener("scroll", function(){

const trigger = 300;

  if(window.scrollY > trigger){
    document.getElementById("stickyBar").classList.remove("hidden");
  } else {

// CART
function addToCart(){

  if(!selectedSize){
    alert("Select size ❗");
    return;
  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const exists = cart.find(p =>
    p._id === product._id &&
    p.size === selectedSize
  );

  // ✅ already exists
  if(exists){

    exists.qty = (exists.qty || 1) + 1;

  }

  // ✅ new item
  else {

   cart.push({

  _id: product._id,

  name: product.name,

  price: product.price,

  size: selectedSize,

  image:
    product.primaryImage ||
    product.images?.[0] ||
    product.image,

  qty: 1,

  deliveryDate:
    window.selectedDeliveryDate || ""

});

  }

  // ✅ save
  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  // ✅ update UI
  checkCartStatus();
  updateCartCount();
  showCartToast();

}
  function checkCartStatus(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const exists = cart.find(p => 
    p.name === product.name && p.size === selectedSize
  );

  const btn = document.getElementById("addBtn");
  const stickyBtn = document.querySelector(".sticky-bar .cart-btn");

  if(exists){
    btn.innerText = "Go to Cart";
    btn.onclick = () => window.location.href = "cart.html";

    if(stickyBtn){
      stickyBtn.innerText = "Go to Cart";
      stickyBtn.onclick = () => window.location.href = "cart.html";
    }

  } else {
    btn.innerText = "Add to Cart";
    btn.onclick = addToCart;

    if(stickyBtn){
      stickyBtn.innerText = "Add to Cart";
      stickyBtn.onclick = stickyAddToCart;
    }
  }
}
  function stickyAddToCart(){

  const size = document.getElementById("stickySize").value;

  if(!size){
    alert("Select size ❗");

  selectedSize = size;   // ⭐ sync with main

  addToCart();           // reuse existing function
}

// ❤️ WISHLIST FUNCTIONS
function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function isFav(id){
  return getFav().some(p => p._id === id);   // ✅ FIXED
}

function toggleFav(id, el){
  let fav = getFav();

  const exist = fav.find(item => item._id === id);

  if(exist){
    fav = fav.filter(item => item._id !== id);
  } else {
    const product = window.allProducts.find(p => p._id === id);
    fav.push(product);
  }

  localStorage.setItem("fav", JSON.stringify(fav));

  el.innerText = isFav(id) ? "♥" : "♡";
}
// SIMILAR PRODUCTS
async function loadSimilar(){
  try{
    const res = await fetch(API + "/products");
    const data = await res.json();

    window.allProducts = data;

    let html = "";

    data
      .filter(p => p.category === product.category && p._id !== product._id)
      .slice(0,5)
      .forEach(p=>{
        html += `
          <div class="similar-card" onclick="openProduct('${p._id}')">

            <div class="fav" onclick="event.stopPropagation(); toggleFav('${p._id}', this)">
              ${isFav(p._id) ? '♥' : '♡'}
            </div>

            <img src="${p.images?.[0] || p.image}">

            <p>${p.name}</p>
            <b>₹${p.price}</b>

          </div>
        `;
      });

    document.getElementById("similar").innerHTML = html;
  } 
  catch(err){
    console.log(err);
  }
  }

function openProduct(id){

  fetch(API + "/products")

  .then(r => r.json())

  .then(data => {

    const p = data.find(x => x._id === id);

    // ✅ recent viewed
    let recent =
      JSON.parse(localStorage.getItem("recentViewed")) || [];

    // duplicate remove
    recent = recent.filter(x => x._id !== p._id);

    // ⭐ SMALL DATA ONLY SAVE
    recent.unshift({
      _id: p._id,
      name: p.name,
      price: p.price,
      image: p.images?.[0] || p.image
    });

    // only 6 items
    recent = recent.slice(0,6);

    localStorage.setItem(
      "recentViewed",
      JSON.stringify(recent)
    );

    // selected product
    localStorage.setItem(
      "selectedProduct",
      JSON.stringify(p)
    );

    window.scrollTo(0,0);

    location.reload();

  });

}

  function calculateDelivery(pin){

  const el = document.getElementById("deliveryText");

  let days = 4;

  if(pin.startsWith("641")) days = 2;
  else if(pin.startsWith("600")) days = 3;
  else if(pin.startsWith("6")) days = 4;
  else days = 6;

  const today = new Date();

  today.setDate(today.getDate() + days);

  const options = {
    weekday: 'long',
    month: 'short',
    day: 'numeric'
  };

  const deliveryDate =
    today.toLocaleDateString('en-IN', options);

  window.selectedDeliveryDate = deliveryDate;

  localStorage.setItem("deliveryDate", deliveryDate);

  el.innerText =
    "Estimated Delivery by " + deliveryDate;

  el.style.color = "green";
}
