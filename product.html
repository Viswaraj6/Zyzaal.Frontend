<script>
async function loadProduct(){

    try{

        const res = await fetch(API + "/products/" + productId);

        if(!res.ok){

            alert("Product not found");

            return;

        }

        product = await res.json();

        startProduct();

    }

    catch(err){

        console.log(err);

    }

}
  const API = "https://fark618-backend.onrender.com";

const params = new URLSearchParams(window.location.search);

const productId = params.get("id");

let product = {};
// PRODUCT START
let images = [];
let currentIndex = 0;
let selectedSize = "";
let touchStartX = 0;
let touchEndX = 0;
let currentTranslate = 0;
let isDragging = false;

function startProduct(){

  // Category
 document.getElementById("name").innerText =
    (product.category || "").toUpperCase();

  // PRICE
  document.getElementById("price").innerText =
    "₹" + product.price;

  // DETAILS
  document.getElementById("specs").innerHTML = `
    <ul style="padding-left:15px;">
      <li><b>Brand:</b> ${product.brand || "-"}</li>
      <li><b>Fabric:</b> ${product.fabric || "-"}</li>
      <li><b>Type:</b> ${product.typeDetail || "-"}</li>
      <li><b>Fit:</b> ${product.fit || "-"}</li>
      <li><b>Pattern:</b> ${product.pattern || "-"}</li>
      <li><b>Color:</b> ${product.color || "-"}</li>
      <li><b>Occasion:</b> ${product.occasion || "-"}</li>
    </ul>

    <p style="margin-top:10px;">
      <b>Description:</b>
      ${product.description || "-"}
    </p>
  `;

  // IMAGES
  if(product.images && product.images.length > 0){
    images = product.images;
  }
  else if(product.image){
    images = [product.image];
  }
  else{
    images = ["https://via.placeholder.com/300"];
  }

  const primary =
    product.primaryImage || images[0];

  currentIndex =
    images.indexOf(primary);

  if(currentIndex < 0){
    currentIndex = 0;
  }

  updateImage();
  document.getElementById("imageLoader").style.display = "none";
document.querySelector(".main-wrapper").style.display = "flex";
  enableSwipe();
  let dots = "";

images.forEach((img,index)=>{

    dots += `
        <span
            class="${index===currentIndex ? 'active':''}"
            onclick="goImage(${index})">
        </span>
    `;

});

document.getElementById("imageDots").innerHTML = dots;

  // THUMBS
  let thumbsHTML = "";

  images.forEach((img)=>{

    thumbsHTML += `
      <img
        src="${img}"
        onclick="changeImage('${img}')"
        class="${
          img === primary
          ? "active"
          : ""
        }"
      >
    `;

  });

  document.getElementById("thumbs").innerHTML =
    thumbsHTML;

  // SIZE
  let sizeHTML = "";

  (product.sizeStock || []).forEach(s=>{

    sizeHTML += `

      <div
        class="size"

        onclick="${
          s.stock <= 0
          ? ""
          : `selectSize(this,'${s.size}')`
        }"

        style="
          ${
            s.stock <= 0
            ? `
            opacity:.5;
            cursor:not-allowed;
            `
            : ""
          }
        "
      >

        ${s.size}

      </div>

    `;

  });

  document.getElementById("sizes").innerHTML =
    sizeHTML;

  // Auto select first available stock size
const firstAvailable = (product.sizeStock || []).find(s => s.stock > 0);

if(firstAvailable){

    selectedSize = firstAvailable.size;

    document.querySelectorAll(".size").forEach(el => {

        if(el.innerText.trim() === firstAvailable.size){
            el.classList.add("active");
        }

    });
 updateStockInfo(selectedSize);
}
  // STICKY
  document.getElementById("stickyImg").src =
    product.primaryImage ||
    product.images?.[0] ||
    product.image;

 document.getElementById("stickyName").innerText =
    product.category || product.name;
  
  document.getElementById("stickyPrice").innerText =
    "₹" + product.price;

  // STICKY SIZE
  let sizeDrop = "";

  (product.sizeStock || []).forEach(s=>{

    sizeDrop += `
      <option
        ${s.stock <= 0 ? "disabled" : ""}
      >
        ${s.size}
      </option>
    `;

  });

  document.getElementById("stickySize").innerHTML =
    sizeDrop;
  if(firstAvailable){
    document.getElementById("stickySize").value = firstAvailable.size;
}

  document.getElementById("stickySize")
  .addEventListener("change", function(){

    selectedSize = this.value;

    checkCartStatus();

  });

  loadSimilar();

  checkCartStatus();

  initDelivery();
  
}

// IMAGE CHANGE
function changeImage(src){

  currentIndex = images.indexOf(src);

  updateImage();

}

// NEXT
function nextImage(){

    currentIndex++;

    if(currentIndex >= images.length){

        currentIndex = 0;

    }

    updateImage();

}
  // PREV
function prevImage(){

    currentIndex--;

    if(currentIndex < 0){

        currentIndex = images.length-1;

    }

    updateImage();

}
  // UPDATE
function updateImage(){

    const prev =
        currentIndex === 0
        ? images.length - 1
        : currentIndex - 1;

    const next =
        currentIndex === images.length - 1
        ? 0
        : currentIndex + 1;

    // 3 images update
   if(window.innerWidth > 768){

    document.getElementById("mainImage").src =
        images[currentIndex];

    document.getElementById("prevImage").style.display="none";
    document.getElementById("nextImage").style.display="none";
}
else{

    document.getElementById("prevImage").style.display="block";
    document.getElementById("nextImage").style.display="block";

    document.getElementById("prevImage").src = images[prev];
    document.getElementById("mainImage").src = images[currentIndex];
    document.getElementById("nextImage").src = images[next];

}
    // Thumbnail active
    document.querySelectorAll(".thumbs img")
        .forEach(x => x.classList.remove("active"));

    const active =
        document.querySelectorAll(".thumbs img")[currentIndex];

    if(active){
        active.classList.add("active");
    }

    // Dots active
    document.querySelectorAll("#imageDots span")
        .forEach(dot => dot.classList.remove("active"));

    const activeDot =
        document.querySelectorAll("#imageDots span")[currentIndex];

    if(activeDot){
        activeDot.classList.add("active");
    }

}
  function goImage(index){

    currentIndex = index;

    updateImage();

}
  function enableSwipe(){

    const image =
    document.querySelector(".main-wrapper");

    image.addEventListener("touchstart",function(e){

        touchStartX = e.touches[0].clientX;

        isDragging = true;

        document.getElementById("slider").style.transition = "none";

    });

    image.addEventListener("touchmove",function(e){

        if(!isDragging) return;

        let currentX = e.touches[0].clientX;

        currentTranslate = currentX - touchStartX;

      document.getElementById("slider").style.transform =
`translateX(calc(-100% + ${currentTranslate}px))`;
    });

    image.addEventListener("touchend",function(){

        isDragging = false;

       const slider =
document.getElementById("slider");

       slider.style.transition =
"transform .30s ease";


        if(currentTranslate < -80){

            nextImage();

        }

        else if(currentTranslate > 80){

            prevImage();

        }

       slider.style.transform =
"translateX(-100%)";

        currentTranslate = 0;

    });

}
  function handleSwipe(){

    if(touchStartX - touchEndX > 50){

        nextImage();

    }

    if(touchEndX - touchStartX > 50){

        prevImage();

    }

}
 function selectSize(el,size){

  function updateStockInfo(size){

    const item = (product.sizeStock || []).find(s => s.size === size);

    const stockEl = document.getElementById("stockInfo");

    if(!item){
        stockEl.innerHTML = "";
        return;
    }

    if(item.stock <= 0){

        stockEl.innerHTML =
        "<span style='color:#d32f2f'>Out of Stock</span>";

    }
    else{

        stockEl.innerHTML =
        "<span style='color:#2e7d32'>Only " +
        item.stock +
        " left in stock</span>";

    }

}
// scroll show/hide
window.addEventListener("scroll", () => {

    const stickyBar = document.getElementById("stickyBar");

    if(window.innerWidth > 768){

        // Desktop → Bottom Sticky
        if(window.scrollY > 300){

            stickyBar.classList.remove("hidden");

        }else{

            stickyBar.classList.add("hidden");

        }

        return;
    }

   // Mobile → Top Sticky

if(window.scrollY > 350){

    stickyBar.classList.remove("hidden");
    stickyBar.classList.add("show");

}else{

    stickyBar.classList.add("hidden");
    stickyBar.classList.remove("show");

}
  
});
  // CART
function addToCart(){

  if(!selectedSize){
    alert("Select size ❗");
    return;
  }

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const exists = cart.find(p =>
    p._id === product._id &&
    p.size === selectedSize
  );

  // ✅ already exists
  if(exists){

    exists.qty = (exists.qty || 1) + 1;

  }

  // ✅ new item
  else {

   cart.push({

  _id: product._id,

  name: product.name,

  price: product.price,

  size: selectedSize,

  image:
    product.primaryImage ||
    product.images?.[0] ||
    product.image,

  qty: 1,

  deliveryDate:
    window.selectedDeliveryDate || ""

});

  }

  // ✅ save
  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  // ✅ update UI
  checkCartStatus();
  updateCartCount();
  showCartToast();

}
  function checkCartStatus(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const exists = cart.find(p => 
    p.name === product.name && p.size === selectedSize
  );

  const btn = document.getElementById("addBtn");
  const stickyBtn = document.querySelector(".sticky-bar .cart-btn");

  if(exists){
    btn.innerText = "Go to Cart";
    btn.onclick = () => window.location.href = "cart.html";

    if(stickyBtn){
      stickyBtn.innerText = "Go to Cart";
      stickyBtn.onclick = () => window.location.href = "cart.html";
    }

  } else {
    btn.innerText = "Add to Cart";
    btn.onclick = addToCart;

    if(stickyBtn){
      stickyBtn.innerText = "Add to Cart";
      stickyBtn.onclick = stickyAddToCart;
    }
  }
}
  function stickyAddToCart(){

}

  // ❤️ WISHLIST FUNCTIONS
function getFav(){
  return JSON.parse(localStorage.getItem("fav")) || [];
}

function isFav(id){
  return getFav().some(p => p._id === id);   // ✅ FIXED
}

function toggleFav(id, el){
  let fav = getFav();

  const exist = fav.find(item => item._id === id);

  if(exist){
    fav = fav.filter(item => item._id !== id);
  } else {
    const product = window.allProducts.find(p => p._id === id);
    fav.push(product);
  }

  localStorage.setItem("fav", JSON.stringify(fav));

  el.innerText = isFav(id) ? "♥" : "♡";
}

function openProduct(id){

    let recent =
      JSON.parse(localStorage.getItem("recentViewed")) || [];

    recent = recent.filter(x => x._id !== id);

    recent.unshift({_id:id});

    recent = recent.slice(0,6);

    localStorage.setItem(
      "recentViewed",
      JSON.stringify(recent)
    );

    // Direct open
    location.href = "product.html?id=" + id;

}

  function calculateDelivery(pin){

  const el = document.getElementById("deliveryText");

  let days = 4;

  if(pin.startsWith("641")) days = 2;
  else if(pin.startsWith("600")) days = 3;
  else if(pin.startsWith("6")) days = 4;
  else days = 6;

  const today = new Date();

  today.setDate(today.getDate() + days);

  const options = {
    weekday: 'long',
    month: 'short',
    day: 'numeric'
  };

  const deliveryDate =
    today.toLocaleDateString('en-IN', options);

  window.selectedDeliveryDate = deliveryDate;

  localStorage.setItem("deliveryDate", deliveryDate);

  el.innerText =
    "Estimated Delivery by " + deliveryDate;

  el.style.color = "green";
}
